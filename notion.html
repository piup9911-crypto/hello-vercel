<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 Mini Notion</title>

    <!-- 引入 Editor.js 核心库与插件 -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@2.31.6"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@2.8.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@2.0.9"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/checklist@1.6.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/quote@2.7.6"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/marker@1.4.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="shared/supabase-auth.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #37352f;
        }

        .mobile-overlay {
            display: none;
        }

        .sidebar-toggle {
            display: none;
        }

        .sidebar {
            width: 280px;
            background: #f7f7f5;
            border-right: 1px solid #e8e8e3;
            display: flex;
            flex-direction: column;
            transition: width 0.2s, transform 0.25s ease;
            z-index: 30;
        }

        .sidebar-header {
            padding: 18px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .nav-back {
            text-decoration: none;
            color: #787774;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .nav-back:hover {
            background: #e8e8e3;
        }

        .new-btn,
        .utility-btn {
            background: #ffffff;
            border: 1px solid #e8e8e3;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #37352f;
            transition: all 0.2s;
            text-align: left;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .new-btn:hover,
        .utility-btn:hover {
            background: #f0f0ea;
        }

        .utility-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .utility-btn {
            justify-content: center;
            font-size: 13px;
            padding: 9px 10px;
        }

        .utility-btn-wide {
            grid-column: 1 / -1;
            justify-content: flex-start;
        }

        .sidebar-hint {
            color: #999;
            font-size: 12px;
            line-height: 1.6;
            padding: 0 2px;
        }

        .file-input {
            display: none;
        }

        .note-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 20px 12px;
        }

        .note-item {
            padding: 10px;
            margin-bottom: 4px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: background 0.2s;
            position: relative;
        }

        .note-item:hover,
        .note-item.active {
            background: #e8e8e3;
        }

        .note-item-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #37352f;
        }

        .note-item-time {
            font-size: 12px;
            color: #999;
            margin-left: 26px;
        }

        .delete-btn {
            position: absolute;
            right: 8px;
            top: 10px;
            font-size: 12px;
            color: #999;
            display: none;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .note-item:hover .delete-btn {
            display: block;
        }

        .delete-btn:hover {
            background: #dcdcdc;
            color: #d9534f;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            position: relative;
            background: #ffffff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 40px;
        }

        .page-header {
            margin-bottom: 10px;
            padding-left: 50px;
        }

        .page-icon {
            font-size: 78px;
            margin-bottom: 15px;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.2s;
            user-select: none;
            border-radius: 12px;
            padding: 4px;
        }

        .page-icon:hover {
            transform: scale(1.05);
            background: #f7f7f5;
        }

        .page-title {
            font-size: 40px;
            font-weight: 700;
            border: none;
            outline: none;
            width: 100%;
            background: transparent;
            color: #37352f;
            margin: 0;
            padding: 0;
        }

        .page-title::placeholder {
            color: #e0e0e0;
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            padding-left: 50px;
        }

        .action-btn {
            background: #ffffff;
            border: 1px solid #e8e8e3;
            padding: 6px 12px;
            border-radius: 6px;
            color: #787774;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn:hover {
            background: #f7f7f5;
            color: #37352f;
        }

        .status {
            position: fixed;
            top: 20px;
            right: 30px;
            font-size: 12px;
            color: #787774;
            background: #ffffff;
            border: 1px solid #e8e8e3;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 6px 12px;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            transform: translateY(-10px);
            z-index: 100;
        }

        .status.show {
            opacity: 1;
            transform: translateY(0);
        }

        .codex-editor__redactor {
            padding-bottom: 150px !important;
        }

        .ce-block__content,
        .ce-toolbar__content {
            max-width: 800px;
        }

        .cdx-quote {
            border-left: 3px solid #37352f;
            padding-left: 14px;
        }

        .help-text {
            color: #999;
            font-size: 13px;
            padding-left: 50px;
            margin-bottom: 15px;
            line-height: 1.7;
        }

        .ce-paragraph[data-placeholder]:empty::before {
            color: #d1d1d1 !important;
            font-style: italic;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e0e0e0;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #c0c0c0;
        }

        @media (max-width: 900px) {
            body {
                overflow: auto;
                min-height: 100vh;
                height: auto;
            }

            .mobile-overlay {
                display: block;
                position: fixed;
                inset: 0;
                background: rgba(55, 53, 47, 0.22);
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.25s ease;
                z-index: 20;
            }

            .mobile-overlay.show {
                opacity: 1;
                pointer-events: auto;
            }

            .sidebar-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
                position: fixed;
                top: 14px;
                left: 14px;
                z-index: 40;
                border: 1px solid #e8e8e3;
                background: rgba(255,255,255,0.96);
                color: #37352f;
                padding: 10px 12px;
                border-radius: 999px;
                box-shadow: 0 8px 24px rgba(0,0,0,0.08);
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: min(84vw, 320px);
                max-width: 320px;
                transform: translateX(-100%);
                box-shadow: 18px 0 40px rgba(0,0,0,0.08);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                min-height: 100vh;
            }

            .container {
                padding: 88px 18px 32px;
            }

            .page-header,
            .action-bar,
            .help-text {
                padding-left: 0;
            }

            .page-title {
                font-size: 32px;
            }

            .page-icon {
                font-size: 62px;
            }

            .status {
                top: 60px;
                right: 16px;
            }
        }

        @media (max-width: 560px) {
            .utility-row {
                grid-template-columns: 1fr;
            }

            .action-btn {
                width: 100%;
                justify-content: center;
            }

            .page-title {
                font-size: 28px;
            }

            .help-text {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="打开文档列表">☰ 文档</button>
    <div class="mobile-overlay" id="mobile-overlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="nav-back">🏠 返回应用主页</a>
            <button class="new-btn" type="button" id="new-note-btn">➕ 新建笔记文档</button>
            <div class="utility-row">
                <button class="utility-btn" type="button" id="export-btn">⬇️ 导出备份</button>
                <button class="utility-btn" type="button" id="import-btn">⬆️ 导入备份</button>
                <button class="utility-btn utility-btn-wide" type="button" id="migrate-btn" hidden>☁️ 导入本地旧数据</button>
                <button class="utility-btn utility-btn-wide" type="button" id="signout-btn">↩ 退出云端登录</button>
            </div>
            <div class="sidebar-hint" id="cloud-status">登录后，当前笔记会自动同步到 Supabase 云端。</div>
            <div class="sidebar-hint" id="auth-email"></div>
            <input class="file-input" type="file" id="import-file-input" accept="application/json,.json">
        </div>
        <div class="note-list" id="note-list"></div>
    </div>

    <div class="main-content" id="main-scroll-area">
        <div class="status" id="save-status">☁️ 正在连接云端</div>

        <div class="container">
            <div class="page-header">
                <div class="page-icon" id="page-icon" title="点击随机更换图标">📄</div>
                <input type="text" class="page-title" id="page-title" placeholder="在这里输入文档标题..." autocomplete="off">
            </div>

            <div class="help-text">💡 提示：点击下方按钮可快捷插入，或在下方空白处直接打字。现在会自动同步到云端，也支持导出/导入整份 JSON 备份。</div>

            <div class="action-bar">
                <button class="action-btn" type="button" data-block-type="paragraph">✍️ 记点笔记</button>
                <button class="action-btn" type="button" data-block-type="header">📌 插入标题</button>
                <button class="action-btn" type="button" data-block-type="checklist">✅ 待办清单</button>
                <button class="action-btn" type="button" data-block-type="list">⚫ 圆点列表</button>
                <button class="action-btn" type="button" data-block-type="quote">💬 引用金句</button>
            </div>

            <div id="editorjs"></div>
        </div>
    </div>

    <script src="shared/notion-app.js"></script>
</body>
</html>
