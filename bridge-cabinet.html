<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桥接工具箱</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #ffffff;
      --text: #243044;
      --muted: #657186;
      --line: #dfe6ef;
      --primary: #2563eb;
      --shadow: 0 18px 48px rgba(31, 45, 70, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
    }

    .shell {
      width: min(100%, 920px);
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      background: var(--panel);
      padding: 26px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f4f7fb;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: 42px;
      line-height: 1.08;
    }

    .lead {
      max-width: 62ch;
      color: var(--muted);
      line-height: 1.75;
      font-size: 15px;
    }

    .back-link,
    .tool-card {
      color: inherit;
      text-decoration: none;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 9px 13px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      font-weight: 700;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .tool-card {
      display: grid;
      gap: 10px;
      min-height: 170px;
      padding: 20px;
      border-radius: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .tool-title {
      font-size: 20px;
      font-weight: 800;
    }

    .tool-body {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .tool-tag {
      width: fit-content;
      padding: 5px 9px;
      border-radius: 999px;
      background: #edf4ff;
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
    }

    @media (max-width: 760px) {
      body { padding: 14px; }
      .panel { padding: 18px; }
      h1 { font-size: 34px; }
      .tool-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div class="topbar">
        <div>
          <div class="eyebrow">首页收纳页</div>
          <h1>桥接工具箱</h1>
          <div class="lead">
            这里收纳桥接相关入口。流程诊断已经放进各个状态页的机器人分区里，打开对应状态页就能看它跑到哪一步。
          </div>
        </div>
        <a class="back-link" href="index.html">返回首页</a>
      </div>
    </section>

    <section class="tool-grid">
      <a class="tool-card" href="bridge-tools.html">
        <div class="tool-title">Gemini 工具箱</div>
        <div class="tool-body">查看 Telegram 桥接、Gemini CLI、本地聊天记录面板和启动说明。</div>
        <div class="tool-tag">工具说明</div>
      </a>

      <a class="tool-card" href="bridge-status.html">
        <div class="tool-title">桥接状态总舱</div>
        <div class="tool-body">查看 Gem 和 Codex 两个桥接系统的运行状态、日志、远程控制和分区流程诊断。</div>
        <div class="tool-tag">运行状态</div>
      </a>
    </section>
  </main>
</body>
</html>
