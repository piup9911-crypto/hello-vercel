<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RP Studio</title>
    <style>
      :root {
        --bg: #f5f6f2;
        --panel: #ffffff;
        --ink: #202124;
        --muted: #667079;
        --line: #d8ddd6;
        --accent: #1f7a68;
        --accent-soft: #e3f1ed;
        --warn: #9a5b16;
        --code: #151917;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--bg);
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
      }

      header {
        padding: 18px 22px 12px;
        background: #eef1ed;
        border-bottom: 1px solid var(--line);
      }

      .header-row,
      .section-head,
      .actions,
      .item-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 22px;
        letter-spacing: 0;
      }

      h2 {
        font-size: 18px;
        letter-spacing: 0;
      }

      h3 {
        font-size: 14px;
        letter-spacing: 0;
      }

      .muted,
      .hint,
      label span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .tabs {
        display: flex;
        gap: 8px;
        padding: 12px 22px;
        border-bottom: 1px solid var(--line);
        background: #f9faf7;
        overflow-x: auto;
      }

      .tab {
        min-width: 108px;
        color: var(--ink);
        background: #fff;
        border: 1px solid var(--line);
      }

      .tab.active {
        color: #fff;
        background: var(--accent);
        border-color: var(--accent);
      }

      .view {
        display: none;
        padding: 20px 22px 28px;
      }

      .view.active {
        display: block;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(260px, 0.8fr) minmax(360px, 1.2fr);
        gap: 16px;
      }

      .library-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 9px 10px;
        background: #fff;
        color: var(--ink);
        outline: none;
      }

      textarea {
        min-height: 92px;
        resize: vertical;
        line-height: 1.5;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      label {
        display: grid;
        gap: 5px;
        font-size: 13px;
        font-weight: 600;
      }

      button {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: 6px;
        padding: 9px 12px;
        cursor: pointer;
        white-space: nowrap;
      }

      button.secondary {
        background: #fff;
        color: var(--accent);
      }

      button:disabled {
        opacity: 0.55;
        cursor: wait;
      }

      .chat-list,
      .item-list {
        display: grid;
        gap: 8px;
      }

      .chat-item,
      .item {
        width: 100%;
        text-align: left;
        color: var(--ink);
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 11px 12px;
      }

      .chat-item.active {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .item {
        cursor: default;
      }

      .item-title {
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      .item-body {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .facts {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .fact {
        background: #fbfcfa;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 11px;
      }

      .fact strong {
        display: block;
        margin-top: 4px;
        font-size: 14px;
        overflow-wrap: anywhere;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .hidden {
        display: none;
      }

      .status {
        min-height: 18px;
        color: var(--warn);
        font-size: 12px;
      }

      .record-link {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }

      pre {
        min-height: 520px;
        margin: 12px 0 0;
        padding: 14px;
        overflow: auto;
        color: #eef5ee;
        background: var(--code);
        border-radius: 8px;
        line-height: 1.5;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      @media (max-width: 980px) {
        .grid,
        .library-grid,
        .facts,
        .row {
          grid-template-columns: 1fr;
        }

        .header-row,
        .section-head,
        .actions {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="header-row">
          <div>
            <h1>RP Studio</h1>
            <p class="muted">给 telegram_rp 会话选择 preset 和 character，然后检查最终 prompt。</p>
          </div>
          <button class="secondary" id="refreshBtn">刷新</button>
        </div>
      </header>

      <nav class="tabs" aria-label="RP Studio sections">
        <button class="tab active" data-tab="session">当前会话</button>
        <button class="tab" data-tab="library">设定库</button>
        <button class="tab" data-tab="preview">Prompt Preview</button>
      </nav>

      <section class="view active" id="tab-session">
        <div class="grid">
          <div class="panel stack">
            <div class="section-head">
              <div>
                <h2>选择会话</h2>
                <p class="muted">同一个 chatId 只会显示一次。</p>
              </div>
            </div>

            <label>
              手动输入 chatId
              <span>例如 telegram_rp_7541487750；只填数字也会自动补前缀。</span>
              <input id="manualChatId" value="telegram_rp_7541487750" />
            </label>
            <button id="useManualBtn">使用这个会话</button>

            <div class="chat-list" id="chatList"></div>
            <div class="status" id="leftStatus"></div>
          </div>

          <div class="panel stack">
            <div class="section-head">
              <div>
                <h2>当前绑定</h2>
                <p class="muted">这里决定这个会话下次预览时注入哪套设定。</p>
              </div>
              <a class="record-link" href="/" target="_blank">打开聊天记录</a>
            </div>

            <div class="facts">
              <div class="fact"><span class="muted">chatId</span><strong id="currentChatFact">-</strong></div>
              <div class="fact"><span class="muted">Preset</span><strong id="currentPresetFact">未绑定</strong></div>
              <div class="fact"><span class="muted">Character</span><strong id="currentCharacterFact">未绑定</strong></div>
            </div>

            <label>
              选择 preset
              <span>会注入 system_prompt、temperature、max_tokens、stop_strings。</span>
              <select id="presetSelect"></select>
            </label>
            <label>
              选择 character
              <span>会注入角色说明、性格、场景、开场白和示例对话。</span>
              <select id="characterSelect"></select>
            </label>
            <button id="saveBindingBtn">保存绑定</button>
          </div>
        </div>
      </section>

      <section class="view" id="tab-library">
        <div class="library-grid">
          <div class="panel stack">
            <div class="section-head">
              <div>
                <h2>Preset 列表</h2>
                <p class="muted">保存提示词和生成参数。</p>
              </div>
              <button class="secondary" id="togglePresetFormBtn">新建</button>
            </div>
            <div class="item-list" id="presetList"></div>

            <div class="stack hidden" id="presetForm">
              <h3>新建 Preset</h3>
              <label>
                名称
                <span>方便你在绑定时识别这套设定。</span>
                <input id="presetName" placeholder="例如：日常 RP 基础设定" />
              </label>
              <label>
                system_prompt
                <span>最上层规则，会放在 prompt 的 [System] 区块。</span>
                <textarea id="presetSystemPrompt"></textarea>
              </label>
              <div class="row">
                <label>
                  temperature
                  <span>回复发散程度，常用 0.7 - 1.0。</span>
                  <input id="presetTemperature" type="number" step="0.1" min="0" max="2" value="0.8" />
                </label>
                <label>
                  max_tokens
                  <span>占位参数，先保存，暂时不接真实模型。</span>
                  <input id="presetMaxTokens" type="number" min="1" value="1200" />
                </label>
              </div>
              <label>
                stop_strings
                <span>一行一个停止词；本轮只保存和预览，不做真实生成。</span>
                <textarea id="presetStops"></textarea>
              </label>
              <button id="createPresetBtn">创建 Preset</button>
            </div>
          </div>

          <div class="panel stack">
            <div class="section-head">
              <div>
                <h2>Character 列表</h2>
                <p class="muted">保存角色卡的最小字段。</p>
              </div>
              <button class="secondary" id="toggleCharacterFormBtn">新建</button>
            </div>
            <div class="item-list" id="characterList"></div>

            <div class="stack hidden" id="characterForm">
              <h3>新建 Character</h3>
              <label>
                名称
                <span>角色名，会显示在 [Character] 区块。</span>
                <input id="characterName" />
              </label>
              <label>
                description
                <span>角色身份、外观、背景。</span>
                <textarea id="characterDescription"></textarea>
              </label>
              <label>
                personality
                <span>性格、说话方式、边界。</span>
                <textarea id="characterPersonality"></textarea>
              </label>
              <label>
                scenario
                <span>当前故事场景和关系状态。</span>
                <textarea id="characterScenario"></textarea>
              </label>
              <label>
                first_mes
                <span>角色第一句示例。</span>
                <textarea id="characterFirstMes"></textarea>
              </label>
              <label>
                mes_example
                <span>几段示例对话，用来稳定语气。</span>
                <textarea id="characterMesExample"></textarea>
              </label>
              <button id="createCharacterBtn">创建 Character</button>
            </div>
          </div>
        </div>
      </section>

      <section class="view" id="tab-preview">
        <div class="panel">
          <div class="section-head">
            <div>
              <h2>Prompt Preview</h2>
              <p class="muted" id="previewUpdated">等待读取</p>
            </div>
            <button class="secondary" id="previewBtn">重新生成</button>
          </div>
          <div class="facts">
            <div class="fact"><span class="muted">chatId</span><strong id="previewChatId">-</strong></div>
            <div class="fact"><span class="muted">preset</span><strong id="previewPreset">未绑定</strong></div>
            <div class="fact"><span class="muted">character</span><strong id="previewCharacter">未绑定</strong></div>
          </div>
          <pre id="promptPreview">等待选择会话。</pre>
        </div>
      </section>
    </div>

    <script>
      const state = {
        chatId: "telegram_rp_7541487750",
        presets: [],
        characters: []
      };

      const $ = (id) => document.getElementById(id);

      async function api(path, options = {}) {
        const response = await fetch(path, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            ...(options.headers || {})
          }
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "请求失败");
        return data;
      }

      function rpChatId(chatId) {
        const value = String(chatId || "").trim();
        return value.startsWith("telegram_rp_") ? value : `telegram_rp_${value}`;
      }

      function option(label, value) {
        const item = document.createElement("option");
        item.textContent = label;
        item.value = value;
        return item;
      }

      function showTab(name) {
        document.querySelectorAll(".tab").forEach((tab) => {
          tab.classList.toggle("active", tab.dataset.tab === name);
        });
        document.querySelectorAll(".view").forEach((view) => {
          view.classList.toggle("active", view.id === `tab-${name}`);
        });
      }

      function renderSelects(binding = {}) {
        $("presetSelect").replaceChildren(option("未绑定", ""));
        for (const preset of state.presets) $("presetSelect").appendChild(option(preset.name, preset.id));
        $("characterSelect").replaceChildren(option("未绑定", ""));
        for (const character of state.characters) $("characterSelect").appendChild(option(character.name, character.id));
        $("presetSelect").value = binding.active_preset_id || "";
        $("characterSelect").value = binding.active_character_id || "";
      }

      function renderLists() {
        $("presetList").replaceChildren();
        for (const preset of state.presets) {
          const item = document.createElement("div");
          item.className = "item";
          item.innerHTML = `<div class="item-head"><div class="item-title"></div><span class="hint"></span></div><div class="item-body"></div>`;
          item.querySelector(".item-title").textContent = preset.name;
          item.querySelector(".hint").textContent = `temp ${preset.temperature} / max ${preset.max_tokens}`;
          item.querySelector(".item-body").textContent = preset.system_prompt || "没有 system_prompt";
          $("presetList").appendChild(item);
        }
        if (!state.presets.length) $("presetList").textContent = "还没有 preset。";

        $("characterList").replaceChildren();
        for (const character of state.characters) {
          const item = document.createElement("div");
          item.className = "item";
          item.innerHTML = `<div class="item-title"></div><div class="item-body"></div>`;
          item.querySelector(".item-title").textContent = character.name;
          item.querySelector(".item-body").textContent =
            character.description || character.personality || character.scenario || "没有角色说明";
          $("characterList").appendChild(item);
        }
        if (!state.characters.length) $("characterList").textContent = "还没有 character。";
      }

      function renderPreview(payload) {
        const preview = payload.promptPreview || {};
        const presetName = preview.presetName || "未绑定";
        const characterName = preview.characterName || "未绑定";
        $("currentChatFact").textContent = payload.chatId || state.chatId;
        $("currentPresetFact").textContent = presetName;
        $("currentCharacterFact").textContent = characterName;
        $("previewChatId").textContent = preview.chatId || state.chatId;
        $("previewPreset").textContent = presetName;
        $("previewCharacter").textContent = characterName;
        $("promptPreview").textContent = preview.prompt || "暂无 prompt。";
        $("previewUpdated").textContent = new Date().toLocaleString();
        renderSelects(payload.binding || {});
      }

      async function loadConfig() {
        const [presets, characters] = await Promise.all([
          api("/api/rp/presets"),
          api("/api/rp/characters")
        ]);
        state.presets = presets.presets || [];
        state.characters = characters.characters || [];
        renderLists();
      }

      async function loadChats() {
        const data = await api("/api/chats");
        const ids = [...new Set((data.chats || []).map((chat) => rpChatId(chat.chatId)))];
        if (!ids.includes(state.chatId)) ids.unshift(state.chatId);
        $("chatList").replaceChildren();
        for (const id of ids) {
          const button = document.createElement("button");
          button.className = `chat-item${id === state.chatId ? " active" : ""}`;
          button.textContent = id;
          button.onclick = () => selectChat(id);
          $("chatList").appendChild(button);
        }
        $("leftStatus").textContent = ids.length ? "" : "还没有读到会话列表。";
      }

      async function loadContext() {
        const payload = await api(`/api/rp/${encodeURIComponent(state.chatId)}/context`);
        renderPreview(payload);
      }

      async function refreshAll() {
        await loadConfig();
        await loadChats();
        await loadContext();
      }

      async function selectChat(chatId) {
        state.chatId = rpChatId(chatId);
        $("manualChatId").value = state.chatId;
        await loadChats();
        await loadContext();
      }

      async function saveBinding() {
        const button = $("saveBindingBtn");
        button.disabled = true;
        try {
          const payload = await api(`/api/rp/${encodeURIComponent(state.chatId)}/context`, {
            method: "POST",
            body: JSON.stringify({
              active_preset_id: $("presetSelect").value,
              active_character_id: $("characterSelect").value,
              active_lorebook_ids: []
            })
          });
          renderPreview(payload);
          showTab("preview");
        } catch (error) {
          showError(error);
        } finally {
          button.disabled = false;
        }
      }

      async function createPreset() {
        const button = $("createPresetBtn");
        button.disabled = true;
        try {
          const data = await api("/api/rp/presets", {
            method: "POST",
            body: JSON.stringify({
              name: $("presetName").value,
              system_prompt: $("presetSystemPrompt").value,
              temperature: $("presetTemperature").value,
              max_tokens: $("presetMaxTokens").value,
              stop_strings: $("presetStops").value
            })
          });
          state.presets = data.presets || [];
          renderLists();
          renderSelects({ active_preset_id: data.preset.id, active_character_id: $("characterSelect").value });
          $("presetName").value = "";
          $("presetSystemPrompt").value = "";
          $("presetStops").value = "";
          $("presetForm").classList.add("hidden");
        } catch (error) {
          showError(error);
        } finally {
          button.disabled = false;
        }
      }

      async function createCharacter() {
        const button = $("createCharacterBtn");
        button.disabled = true;
        try {
          const data = await api("/api/rp/characters", {
            method: "POST",
            body: JSON.stringify({
              name: $("characterName").value,
              description: $("characterDescription").value,
              personality: $("characterPersonality").value,
              scenario: $("characterScenario").value,
              first_mes: $("characterFirstMes").value,
              mes_example: $("characterMesExample").value
            })
          });
          state.characters = data.characters || [];
          renderLists();
          renderSelects({ active_preset_id: $("presetSelect").value, active_character_id: data.character.id });
          for (const id of [
            "characterName",
            "characterDescription",
            "characterPersonality",
            "characterScenario",
            "characterFirstMes",
            "characterMesExample"
          ]) $(id).value = "";
          $("characterForm").classList.add("hidden");
        } catch (error) {
          showError(error);
        } finally {
          button.disabled = false;
        }
      }

      function showError(error) {
        $("leftStatus").textContent = error && error.message ? error.message : String(error);
      }

      document.querySelectorAll(".tab").forEach((tab) => {
        tab.onclick = () => showTab(tab.dataset.tab);
      });
      $("togglePresetFormBtn").onclick = () => $("presetForm").classList.toggle("hidden");
      $("toggleCharacterFormBtn").onclick = () => $("characterForm").classList.toggle("hidden");
      $("refreshBtn").onclick = () => refreshAll().catch(showError);
      $("previewBtn").onclick = () => loadContext().catch(showError);
      $("useManualBtn").onclick = () => selectChat($("manualChatId").value).catch(showError);
      $("saveBindingBtn").onclick = saveBinding;
      $("createPresetBtn").onclick = createPreset;
      $("createCharacterBtn").onclick = createCharacter;

      refreshAll().catch(showError);
    </script>
  </body>
</html>
