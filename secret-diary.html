<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秘密日记</title>
    <style>
        :root {
            --bg: #f6f1ff;
            --bg-soft: #fcf8ff;
            --panel: rgba(255, 255, 255, 0.88);
            --panel-strong: rgba(255, 255, 255, 0.96);
            --text: #372f43;
            --muted: #7f7490;
            --line: #e7ddf3;
            --primary: #8b5cf6;
            --primary-soft: #f2ebff;
            --danger: #ef4444;
            --shadow: 0 20px 50px rgba(92, 56, 153, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(255,255,255,0.95), transparent 35%),
                radial-gradient(circle at bottom right, rgba(201, 178, 255, 0.35), transparent 25%),
                linear-gradient(160deg, #fbf7ff 0%, #f6f1ff 45%, #f7fbff 100%);
        }

        .nav-back {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            text-decoration: none;
            background: rgba(255,255,255,0.88);
            color: var(--text);
            padding: 10px 16px;
            border-radius: 999px;
            box-shadow: 0 10px 25px rgba(55, 47, 67, 0.08);
            border: 1px solid rgba(255,255,255,0.7);
            backdrop-filter: blur(16px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .nav-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(55, 47, 67, 0.12);
        }

        .status {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255,255,255,0.9);
            color: var(--muted);
            padding: 10px 14px;
            border-radius: 999px;
            box-shadow: 0 10px 25px rgba(55, 47, 67, 0.08);
            border: 1px solid rgba(255,255,255,0.7);
            backdrop-filter: blur(16px);
            font-size: 13px;
            opacity: 0;
            transform: translateY(-6px);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .status.show {
            opacity: 1;
            transform: translateY(0);
        }

        .shell {
            max-width: 1400px;
            margin: 0 auto;
            padding: 88px 24px 32px;
            display: grid;
            grid-template-columns: 340px minmax(0, 1fr);
            gap: 24px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.65);
            box-shadow: var(--shadow);
            border-radius: 28px;
            backdrop-filter: blur(18px);
        }

        .sidebar {
            padding: 24px;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 120px);
            position: sticky;
            top: 88px;
        }

        .sidebar h1 {
            margin: 0;
            font-size: 30px;
            line-height: 1.15;
        }

        .sidebar-subtitle {
            margin-top: 10px;
            color: var(--muted);
            line-height: 1.6;
            font-size: 14px;
        }

        .privacy-note {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(255,255,255,0.7);
            border: 1px solid var(--line);
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .toolbar {
            margin-top: 18px;
            display: grid;
            gap: 12px;
        }

        .search-input,
        .page-title,
        .diary-textarea {
            width: 100%;
            border: 1px solid transparent;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .search-input {
            background: rgba(255,255,255,0.9);
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 14px;
            color: var(--text);
            border-color: var(--line);
        }

        .search-input:focus,
        .page-title:focus,
        .diary-textarea:focus {
            border-color: rgba(139, 92, 246, 0.45);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.08);
        }

        .new-entry-btn,
        .soft-btn,
        .danger-btn,
        .ghost-btn,
        .mini-chip,
        .mode-chip,
        .mood-chip,
        .prompt-chip {
            border: none;
            cursor: pointer;
            font: inherit;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, border-color 0.18s ease;
        }

        .new-entry-btn {
            background: linear-gradient(135deg, #8b5cf6 0%, #b084ff 100%);
            color: white;
            padding: 14px 18px;
            border-radius: 18px;
            font-weight: 700;
            box-shadow: 0 14px 28px rgba(139, 92, 246, 0.24);
        }

        .new-entry-btn:hover,
        .soft-btn:hover,
        .danger-btn:hover,
        .ghost-btn:hover,
        .prompt-chip:hover,
        .mood-chip:hover,
        .mode-chip:hover {
            transform: translateY(-1px);
        }

        .entry-list {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: auto;
            padding-right: 4px;
        }

        .entry-card {
            padding: 16px;
            border-radius: 18px;
            background: rgba(255,255,255,0.78);
            border: 1px solid var(--line);
            transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
            cursor: pointer;
        }

        .entry-card.active {
            background: var(--panel-strong);
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 12px 30px rgba(139, 92, 246, 0.12);
        }

        .entry-card:hover {
            border-color: rgba(139, 92, 246, 0.25);
            transform: translateY(-1px);
        }

        .entry-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
        }

        .entry-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .entry-date {
            color: var(--muted);
            font-size: 12px;
            flex-shrink: 0;
        }

        .entry-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .mini-chip {
            background: var(--primary-soft);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .mini-chip.private {
            background: #f3f4f6;
            color: #6b7280;
        }

        .mini-chip.vent {
            background: #fff1f2;
            color: #be123c;
        }

        .entry-snippet {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.8em;
        }

        .empty-state {
            margin-top: 14px;
            padding: 18px;
            border-radius: 18px;
            background: rgba(255,255,255,0.6);
            border: 1px dashed var(--line);
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
        }

        .main {
            padding: 28px;
            min-height: calc(100vh - 120px);
        }

        .main-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .head-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .meta-pill {
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.8);
            border: 1px solid var(--line);
            color: var(--muted);
            font-size: 13px;
        }

        .action-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .soft-btn,
        .ghost-btn,
        .danger-btn {
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
        }

        .soft-btn {
            background: rgba(139, 92, 246, 0.12);
            color: var(--primary);
        }

        .ghost-btn {
            background: rgba(255,255,255,0.82);
            color: var(--text);
            border: 1px solid var(--line);
        }

        .danger-btn {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .page-title {
            font-size: 42px;
            font-weight: 800;
            color: var(--text);
            background: transparent;
            padding: 0;
            margin: 0 0 18px;
        }

        .page-title::placeholder {
            color: #c3bacf;
        }

        .section {
            margin-top: 20px;
        }

        .section-label {
            margin-bottom: 10px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .mood-chip,
        .mode-chip,
        .prompt-chip {
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,0.82);
            border: 1px solid var(--line);
            color: var(--text);
            font-size: 14px;
        }

        .mood-chip.active,
        .mode-chip.active,
        .prompt-chip.active {
            background: var(--primary-soft);
            border-color: rgba(139, 92, 246, 0.35);
            color: var(--primary);
            box-shadow: 0 12px 25px rgba(139, 92, 246, 0.1);
        }

        .mode-help {
            margin-top: 10px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
            background: rgba(255,255,255,0.7);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 14px 16px;
        }

        .diary-textarea {
            min-height: 420px;
            resize: vertical;
            background: rgba(255,255,255,0.82);
            color: var(--text);
            border-radius: 24px;
            padding: 22px;
            line-height: 1.9;
            font-size: 16px;
            border-color: var(--line);
        }

        .prompt-row {
            margin-top: 14px;
        }

        .footer-row {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .footer-note {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.7;
        }

        .counter {
            color: var(--muted);
            font-size: 13px;
        }

        @media (max-width: 1080px) {
            .shell {
                grid-template-columns: 1fr;
            }

            .sidebar,
            .main {
                min-height: auto;
                position: static;
            }
        }

        @media (max-width: 720px) {
            .shell {
                padding: 84px 16px 24px;
            }

            .main,
            .sidebar {
                padding: 20px;
            }

            .page-title {
                font-size: 30px;
            }

            .diary-textarea {
                min-height: 320px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="nav-back">🏠 返回主页</a>
    <div class="status" id="save-status">已自动保存到当前浏览器</div>

    <div class="shell">
        <aside class="panel sidebar">
            <div>
                <h1>秘密日记 🤍</h1>
                <div class="sidebar-subtitle">
                    这里只有你自己。先不用把话说得漂亮，想怎么写，就怎么写。
                </div>
                <div class="privacy-note">
                    当前版本是本地私密版：内容只保存在这台设备当前浏览器里，不会自动上传。
                </div>
            </div>

            <div class="toolbar">
                <button class="new-entry-btn" id="new-entry-btn">＋ 新建一篇日记</button>
                <input id="search-input" class="search-input" type="text" placeholder="搜索标题或内容...">
            </div>

            <div id="entry-list" class="entry-list"></div>
            <div id="empty-state" class="empty-state" style="display:none;">
                这里暂时没有符合搜索条件的日记。<br>
                试着换个关键词，或者新写一篇给自己。
            </div>
        </aside>

        <main class="panel main">
            <div class="main-head">
                <div class="head-meta">
                    <div class="meta-pill" id="created-at">创建于 --</div>
                    <div class="meta-pill" id="updated-at">最近修改 --</div>
                </div>
                <div class="action-row">
                    <button class="ghost-btn" id="export-btn">导出这一篇</button>
                    <button class="danger-btn" id="delete-btn">删除这一篇</button>
                </div>
            </div>

            <input id="entry-title" class="page-title" type="text" placeholder="今天想给这篇日记起什么名字？">

            <section class="section">
                <div class="section-label">现在的心情</div>
                <div class="chips" id="mood-chips"></div>
            </section>

            <section class="section">
                <div class="section-label">这篇日记的去向</div>
                <div class="chips" id="mode-chips"></div>
                <div class="mode-help" id="mode-help"></div>
            </section>

            <section class="section">
                <div class="section-label">写给今天的自己</div>
                <textarea id="entry-body" class="diary-textarea" placeholder="把今天想留下的话写在这里吧。哪怕只是碎片、委屈、兴奋、疲惫，先放下来也没关系。"></textarea>
                <div class="prompt-row chips" id="prompt-chips"></div>
            </section>

            <div class="footer-row">
                <div class="footer-note">
                    你可以把这里当作只给自己看的房间。<br>
                    写完以后，它会自动保存在本地。以后如果想接 AI 整理或长期记忆，也可以基于这里继续扩展。
                </div>
                <div class="counter" id="word-count">0 字</div>
            </div>
        </main>
    </div>

    <script>
        const STORAGE_KEY = 'secret-diary-entries-v1';
        const ACTIVE_KEY = 'secret-diary-active-id-v1';

        const moodOptions = [
            { key: 'calm', label: '平静', emoji: '🌙' },
            { key: 'happy', label: '开心', emoji: '☀️' },
            { key: 'soft', label: '心软', emoji: '🫧' },
            { key: 'wronged', label: '委屈', emoji: '🥺' },
            { key: 'anxious', label: '焦虑', emoji: '🌧️' },
            { key: 'tired', label: '疲惫', emoji: '🫠' },
            { key: 'angry', label: '生气', emoji: '🌶️' },
            { key: 'love', label: '心动', emoji: '💗' }
        ];

        const memoryModes = {
            private: {
                label: '只留在这里',
                helper: '这篇只是安安静静留在你的秘密日记里，不默认进入长期记忆。',
                chipClass: 'private'
            },
            remember: {
                label: '值得记住',
                helper: '这篇里可能有值得以后继续记住的偏好、感受或重要线索。',
                chipClass: ''
            },
            vent: {
                label: '只是发泄',
                helper: '这一篇只是把情绪放下来，不要轻易把它当成长久结论。',
                chipClass: 'vent'
            }
        };

        const promptTemplates = [
            '今天最想记住的一瞬间是：',
            '现在最想对自己说的一句话是：',
            '今天让我难受的地方是：',
            '如果有人真正懂我，他应该知道：',
            '我希望明天的自己记得：'
        ];

        const entryList = document.getElementById('entry-list');
        const emptyState = document.getElementById('empty-state');
        const searchInput = document.getElementById('search-input');
        const saveStatus = document.getElementById('save-status');
        const entryTitle = document.getElementById('entry-title');
        const entryBody = document.getElementById('entry-body');
        const createdAt = document.getElementById('created-at');
        const updatedAt = document.getElementById('updated-at');
        const wordCount = document.getElementById('word-count');
        const modeHelp = document.getElementById('mode-help');
        const moodChips = document.getElementById('mood-chips');
        const modeChips = document.getElementById('mode-chips');
        const promptChips = document.getElementById('prompt-chips');

        let entries = [];
        let activeId = null;
        let saveTimer = null;

        function uid() {
            if (window.crypto && crypto.randomUUID) {
                return crypto.randomUUID();
            }
            return 'entry-' + Date.now() + '-' + Math.random().toString(16).slice(2);
        }

        function formatDate(ts) {
            return new Intl.DateTimeFormat('zh-CN', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            }).format(new Date(ts));
        }

        function formatDateLong(ts) {
            return new Intl.DateTimeFormat('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long',
                hour: '2-digit',
                minute: '2-digit'
            }).format(new Date(ts));
        }

        function escapeHtml(str) {
            return (str || '').replace(/[&<>'"]/g, (tag) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag]));
        }

        function getEntries() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                const parsed = raw ? JSON.parse(raw) : [];
                return Array.isArray(parsed) ? parsed : [];
            } catch (error) {
                console.error('读取秘密日记失败', error);
                return [];
            }
        }

        function persistEntries(message = '已自动保存到当前浏览器') {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
            localStorage.setItem(ACTIVE_KEY, activeId || '');
            showSaveStatus(message);
        }

        function showSaveStatus(message) {
            clearTimeout(saveTimer);
            saveStatus.textContent = message;
            saveStatus.classList.add('show');
            saveTimer = setTimeout(() => saveStatus.classList.remove('show'), 1800);
        }

        function createEntry(seed = {}) {
            const now = Date.now();
            return {
                id: uid(),
                title: seed.title || '',
                body: seed.body || '',
                mood: seed.mood || 'calm',
                memoryMode: seed.memoryMode || 'private',
                createdAt: now,
                updatedAt: now
            };
        }

        function ensureInitialEntry() {
            if (entries.length) {
                return;
            }
            entries = [createEntry({
                title: '秘密日记开始了',
                body: '这里可以写今天发生的事，也可以只写一句想藏起来的话。\n\n不用整理得很漂亮，也不用急着讲道理。先把真正想说的放下来。',
                mood: 'soft',
                memoryMode: 'private'
            })];
            activeId = entries[0].id;
            persistEntries('已经为你准备好第一篇秘密日记');
        }

        function getActiveEntry() {
            return entries.find((entry) => entry.id === activeId) || entries[0] || null;
        }

        function sortEntries() {
            entries.sort((a, b) => b.updatedAt - a.updatedAt);
        }

        function renderMoodChips() {
            const current = getActiveEntry();
            moodChips.innerHTML = moodOptions.map((mood) => {
                const active = current && current.mood === mood.key ? 'active' : '';
                return `<button class="mood-chip ${active}" data-mood="${mood.key}">${mood.emoji} ${mood.label}</button>`;
            }).join('');
        }

        function renderModeChips() {
            const current = getActiveEntry();
            modeChips.innerHTML = Object.entries(memoryModes).map(([key, value]) => {
                const active = current && current.memoryMode === key ? 'active' : '';
                return `<button class="mode-chip ${active}" data-mode="${key}">${value.label}</button>`;
            }).join('');
            if (current) {
                modeHelp.textContent = memoryModes[current.memoryMode].helper;
            }
        }

        function renderPromptChips() {
            promptChips.innerHTML = promptTemplates.map((item) => `<button class="prompt-chip" data-template="${escapeHtml(item)}">${escapeHtml(item)}</button>`).join('');
        }

        function renderEntryList() {
            const keyword = searchInput.value.trim().toLowerCase();
            sortEntries();
            const filtered = entries.filter((entry) => {
                if (!keyword) return true;
                return `${entry.title} ${entry.body}`.toLowerCase().includes(keyword);
            });

            emptyState.style.display = filtered.length ? 'none' : 'block';
            entryList.innerHTML = filtered.map((entry) => {
                const mood = moodOptions.find((item) => item.key === entry.mood) || moodOptions[0];
                const title = entry.title.trim() || '未命名日记';
                const snippet = entry.body.trim() || '还没开始写，但这页已经替你留好了。';
                const mode = memoryModes[entry.memoryMode] || memoryModes.private;
                const active = entry.id === activeId ? 'active' : '';
                const safeSnippet = escapeHtml(snippet).replace(/\n+/g, ' ');
                return `
                    <div class="entry-card ${active}" data-entry-id="${entry.id}">
                        <div class="entry-card-top">
                            <div class="entry-title">${escapeHtml(title)}</div>
                            <div class="entry-date">${formatDate(entry.updatedAt)}</div>
                        </div>
                        <div class="entry-meta">
                            <div class="mini-chip">${mood.emoji} ${mood.label}</div>
                            <div class="mini-chip ${mode.chipClass}">${mode.label}</div>
                        </div>
                        <div class="entry-snippet">${safeSnippet}</div>
                    </div>
                `;
            }).join('');
        }

        function renderActiveEntry() {
            const current = getActiveEntry();
            if (!current) return;
            entryTitle.value = current.title;
            entryBody.value = current.body;
            createdAt.textContent = '创建于 ' + formatDateLong(current.createdAt);
            updatedAt.textContent = '最近修改 ' + formatDateLong(current.updatedAt);
            wordCount.textContent = `${current.body.trim().length} 字`;
            renderMoodChips();
            renderModeChips();
            renderEntryList();
        }

        function setActiveEntry(id) {
            activeId = id;
            localStorage.setItem(ACTIVE_KEY, id);
            renderActiveEntry();
        }

        function updateActiveEntry(patch, message) {
            const current = getActiveEntry();
            if (!current) return;
            Object.assign(current, patch, { updatedAt: Date.now() });
            wordCount.textContent = `${current.body.trim().length} 字`;
            persistEntries(message || '已自动保存到当前浏览器');
            renderActiveEntry();
        }

        function addNewEntry() {
            const entry = createEntry();
            entries.unshift(entry);
            activeId = entry.id;
            persistEntries('已经替你新建了一篇日记');
            renderActiveEntry();
            entryTitle.focus();
        }

        function deleteActiveEntry() {
            if (entries.length <= 1) {
                alert('至少留下一篇吧，不然这个小房间会空掉。');
                return;
            }
            const current = getActiveEntry();
            if (!current) return;
            const ok = window.confirm(`确定要删除《${current.title.trim() || '未命名日记'}》吗？这一步不能撤回。`);
            if (!ok) return;
            entries = entries.filter((entry) => entry.id !== current.id);
            activeId = entries[0]?.id || null;
            persistEntries('这一篇已经被删掉了');
            renderActiveEntry();
        }

        function exportActiveEntry() {
            const current = getActiveEntry();
            if (!current) return;
            const mood = moodOptions.find((item) => item.key === current.mood) || moodOptions[0];
            const mode = memoryModes[current.memoryMode] || memoryModes.private;
            const filename = `${(current.title || '秘密日记').replace(/[\\/:*?"<>|]/g, '-').slice(0, 30) || '秘密日记'}.txt`;
            const content = [
                current.title || '未命名日记',
                '',
                `心情：${mood.emoji} ${mood.label}`,
                `去向：${mode.label}`,
                `创建时间：${formatDateLong(current.createdAt)}`,
                `最近修改：${formatDateLong(current.updatedAt)}`,
                '',
                current.body || ''
            ].join('\n');

            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showSaveStatus('已经导出这一篇日记');
        }

        function applyPrompt(template) {
            const current = getActiveEntry();
            if (!current) return;
            const prefix = current.body.trim() ? `${current.body.trim()}\n\n` : '';
            entryBody.value = prefix + template;
            updateActiveEntry({ body: entryBody.value }, '已帮你塞进一个写作提示');
            entryBody.focus();
            entryBody.setSelectionRange(entryBody.value.length, entryBody.value.length);
        }

        function boot() {
            entries = getEntries();
            activeId = localStorage.getItem(ACTIVE_KEY) || null;
            ensureInitialEntry();
            if (!entries.find((entry) => entry.id === activeId)) {
                activeId = entries[0].id;
            }
            renderPromptChips();
            renderActiveEntry();
        }

        document.getElementById('new-entry-btn').addEventListener('click', addNewEntry);
        document.getElementById('delete-btn').addEventListener('click', deleteActiveEntry);
        document.getElementById('export-btn').addEventListener('click', exportActiveEntry);

        searchInput.addEventListener('input', renderEntryList);

        entryTitle.addEventListener('input', (event) => {
            updateActiveEntry({ title: event.target.value });
        });

        entryBody.addEventListener('input', (event) => {
            updateActiveEntry({ body: event.target.value });
        });

        moodChips.addEventListener('click', (event) => {
            const button = event.target.closest('[data-mood]');
            if (!button) return;
            updateActiveEntry({ mood: button.dataset.mood }, '心情标签已更新');
        });

        modeChips.addEventListener('click', (event) => {
            const button = event.target.closest('[data-mode]');
            if (!button) return;
            updateActiveEntry({ memoryMode: button.dataset.mode }, '这篇日记的去向已经记下来了');
        });

        promptChips.addEventListener('click', (event) => {
            const button = event.target.closest('[data-template]');
            if (!button) return;
            applyPrompt(button.dataset.template);
        });

        entryList.addEventListener('click', (event) => {
            const card = event.target.closest('[data-entry-id]');
            if (!card) return;
            setActiveEntry(card.dataset.entryId);
        });

        boot();
    </script>
</body>
</html>
