<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秘密日记</title>
    <style>
        :root {
            --bg: #f6f1ff;
            --bg-soft: #fcf8ff;
            --panel: rgba(255, 255, 255, 0.88);
            --panel-strong: rgba(255, 255, 255, 0.96);
            --text: #372f43;
            --muted: #7f7490;
            --line: #e7ddf3;
            --primary: #8b5cf6;
            --primary-soft: #f2ebff;
            --danger: #ef4444;
            --shadow: 0 20px 50px rgba(92, 56, 153, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(255,255,255,0.95), transparent 35%),
                radial-gradient(circle at bottom right, rgba(201, 178, 255, 0.35), transparent 25%),
                linear-gradient(160deg, #fbf7ff 0%, #f6f1ff 45%, #f7fbff 100%);
        }

        .nav-back {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            text-decoration: none;
            background: rgba(255,255,255,0.88);
            color: var(--text);
            padding: 10px 16px;
            border-radius: 999px;
            box-shadow: 0 10px 25px rgba(55, 47, 67, 0.08);
            border: 1px solid rgba(255,255,255,0.7);
            backdrop-filter: blur(16px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .nav-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(55, 47, 67, 0.12);
        }

        .status {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255,255,255,0.9);
            color: var(--muted);
            padding: 10px 14px;
            border-radius: 999px;
            box-shadow: 0 10px 25px rgba(55, 47, 67, 0.08);
            border: 1px solid rgba(255,255,255,0.7);
            backdrop-filter: blur(16px);
            font-size: 13px;
            opacity: 0;
            transform: translateY(-6px);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .status.show {
            opacity: 1;
            transform: translateY(0);
        }

        .shell {
            max-width: 1400px;
            margin: 0 auto;
            padding: 88px 24px 32px;
            display: grid;
            grid-template-columns: 340px minmax(0, 1fr);
            gap: 24px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.65);
            box-shadow: var(--shadow);
            border-radius: 28px;
            backdrop-filter: blur(18px);
        }

        .sidebar {
            padding: 24px;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 120px);
            position: sticky;
            top: 88px;
        }

        .sidebar h1 {
            margin: 0;
            font-size: 30px;
            line-height: 1.15;
        }

        .sidebar-subtitle {
            margin-top: 10px;
            color: var(--muted);
            line-height: 1.6;
            font-size: 14px;
        }

        .privacy-note {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(255,255,255,0.7);
            border: 1px solid var(--line);
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .toolbar {
            margin-top: 18px;
            display: grid;
            gap: 12px;
        }

        .search-input,
        .page-title,
        .diary-textarea {
            width: 100%;
            border: 1px solid transparent;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .search-input {
            background: rgba(255,255,255,0.9);
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 14px;
            color: var(--text);
            border-color: var(--line);
        }

        .search-input:focus,
        .page-title:focus,
        .diary-textarea:focus {
            border-color: rgba(139, 92, 246, 0.45);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.08);
        }

        .new-entry-btn,
        .soft-btn,
        .danger-btn,
        .ghost-btn,
        .mini-chip,
        .mode-chip,
        .mood-chip,
        .prompt-chip {
            border: none;
            cursor: pointer;
            font: inherit;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, border-color 0.18s ease;
        }

        .new-entry-btn {
            background: linear-gradient(135deg, #8b5cf6 0%, #b084ff 100%);
            color: white;
            padding: 14px 18px;
            border-radius: 18px;
            font-weight: 700;
            box-shadow: 0 14px 28px rgba(139, 92, 246, 0.24);
        }

        .new-entry-btn:hover,
        .soft-btn:hover,
        .danger-btn:hover,
        .ghost-btn:hover,
        .prompt-chip:hover,
        .mood-chip:hover,
        .mode-chip:hover {
            transform: translateY(-1px);
        }

        .entry-list {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: auto;
            padding-right: 4px;
        }

        .entry-card {
            padding: 16px;
            border-radius: 18px;
            background: rgba(255,255,255,0.78);
            border: 1px solid var(--line);
            transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
            cursor: pointer;
        }

        .entry-card.active {
            background: var(--panel-strong);
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 12px 30px rgba(139, 92, 246, 0.12);
        }

        .entry-card:hover {
            border-color: rgba(139, 92, 246, 0.25);
            transform: translateY(-1px);
        }

        .entry-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
        }

        .entry-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .entry-date {
            color: var(--muted);
            font-size: 12px;
            flex-shrink: 0;
        }

        .entry-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .mini-chip {
            background: var(--primary-soft);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .mini-chip.private {
            background: #f3f4f6;
            color: #6b7280;
        }

        .mini-chip.vent {
            background: #fff1f2;
            color: #be123c;
        }

        .entry-snippet {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.8em;
        }

        .empty-state {
            margin-top: 14px;
            padding: 18px;
            border-radius: 18px;
            background: rgba(255,255,255,0.6);
            border: 1px dashed var(--line);
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
        }

        .main {
            padding: 28px;
            min-height: calc(100vh - 120px);
        }

        .main-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .head-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .meta-pill {
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.8);
            border: 1px solid var(--line);
            color: var(--muted);
            font-size: 13px;
        }

        .action-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .soft-btn,
        .ghost-btn,
        .danger-btn {
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
        }

        .soft-btn {
            background: rgba(139, 92, 246, 0.12);
            color: var(--primary);
        }

        .ghost-btn {
            background: rgba(255,255,255,0.82);
            color: var(--text);
            border: 1px solid var(--line);
        }

        .danger-btn {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .page-title {
            font-size: 42px;
            font-weight: 800;
            color: var(--text);
            background: transparent;
            padding: 0;
            margin: 0 0 18px;
        }

        .page-title::placeholder {
            color: #c3bacf;
        }

        .section {
            margin-top: 20px;
        }

        .section-label {
            margin-bottom: 10px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .mood-chip,
        .mode-chip,
        .prompt-chip {
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,0.82);
            border: 1px solid var(--line);
            color: var(--text);
            font-size: 14px;
        }

        .mood-chip.active,
        .mode-chip.active,
        .prompt-chip.active {
            background: var(--primary-soft);
            border-color: rgba(139, 92, 246, 0.35);
            color: var(--primary);
            box-shadow: 0 12px 25px rgba(139, 92, 246, 0.1);
        }

        .mode-help {
            margin-top: 10px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
            background: rgba(255,255,255,0.7);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 14px 16px;
        }

        .diary-textarea {
            min-height: 420px;
            resize: vertical;
            background: rgba(255,255,255,0.82);
            color: var(--text);
            border-radius: 24px;
            padding: 22px;
            line-height: 1.9;
            font-size: 16px;
            border-color: var(--line);
        }

        .prompt-row {
            margin-top: 14px;
        }

        .footer-row {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .footer-note {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.7;
        }

        .counter {
            color: var(--muted);
            font-size: 13px;
        }

        @media (max-width: 1080px) {
            .shell {
                grid-template-columns: 1fr;
            }

            .sidebar,
            .main {
                min-height: auto;
                position: static;
            }
        }

        @media (max-width: 720px) {
            .shell {
                padding: 84px 16px 24px;
            }

            .main,
            .sidebar {
                padding: 20px;
            }

            .page-title {
                font-size: 30px;
            }

            .diary-textarea {
                min-height: 320px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="shared/supabase-auth.js"></script>
</head>
<body>
    <a href="index.html" class="nav-back">🏠 返回主页</a>
    <div class="status" id="save-status">☁️ 正在连接云端</div>

    <div class="shell">
        <aside class="panel sidebar">
            <div>
                <h1>秘密日记 🤍</h1>
                <div class="sidebar-subtitle">
                    这里只有你自己。先不用把话说得漂亮，想怎么写，就怎么写。
                </div>
                <div class="privacy-note" id="cloud-status">
                    登录后，这里的内容会自动同步到 Supabase 云端，仍然只允许你自己的账号读取。
                </div>
                <div class="sidebar-subtitle" id="auth-email"></div>
            </div>

            <div class="toolbar">
                <button class="new-entry-btn" id="new-entry-btn">＋ 新建一篇日记</button>
                <input id="search-input" class="search-input" type="text" placeholder="搜索标题或内容...">
                <div class="chips">
                    <button class="ghost-btn" id="migrate-btn" type="button" hidden>☁️ 导入本地旧日记</button>
                    <button class="ghost-btn" id="signout-btn" type="button">↩ 退出云端登录</button>
                </div>
            </div>

            <div id="entry-list" class="entry-list"></div>
            <div id="empty-state" class="empty-state" style="display:none;">
                这里暂时没有符合搜索条件的日记。<br>
                试着换个关键词，或者新写一篇给自己。
            </div>
        </aside>

        <main class="panel main">
            <div class="main-head">
                <div class="head-meta">
                    <div class="meta-pill" id="created-at">创建于 --</div>
                    <div class="meta-pill" id="updated-at">最近修改 --</div>
                </div>
                <div class="action-row">
                    <button class="ghost-btn" id="export-btn">导出这一篇</button>
                    <button class="danger-btn" id="delete-btn">删除这一篇</button>
                </div>
            </div>

            <input id="entry-title" class="page-title" type="text" placeholder="今天想给这篇日记起什么名字？">

            <section class="section">
                <div class="section-label">现在的心情</div>
                <div class="chips" id="mood-chips"></div>
            </section>

            <section class="section">
                <div class="section-label">这篇日记的去向</div>
                <div class="chips" id="mode-chips"></div>
                <div class="mode-help" id="mode-help"></div>
            </section>

            <section class="section">
                <div class="section-label">写给今天的自己</div>
                <textarea id="entry-body" class="diary-textarea" placeholder="把今天想留下的话写在这里吧。哪怕只是碎片、委屈、兴奋、疲惫，先放下来也没关系。"></textarea>
                <div class="prompt-row chips" id="prompt-chips"></div>
            </section>

            <div class="footer-row">
                <div class="footer-note">
                    你可以把这里当作只给自己看的房间。<br>
                    写完以后，它会自动同步到云端。以后如果想接图片存储、AI 整理或长期记忆，也可以继续往下扩展。
                </div>
                <div class="counter" id="word-count">0 字</div>
            </div>
        </main>
    </div>

    <!-- [BUG-1 FIX] 已删除旧版 type="text/plain" 的本地存储日记脚本（约350行死代码）。
         该脚本使用 localStorage 做数据持久化，已被 shared/secret-diary-app.js 的 Supabase 云端版完全替代。
         type="text/plain" 的 script 标签不会被浏览器执行，保留只会白白增加约12KB页面体积。
         如需参考旧逻辑，请查看 Git 历史记录。 -->
    <script src="shared/secret-diary-app.js"></script>
</body>
</html>
