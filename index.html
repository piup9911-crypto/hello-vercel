<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人应用集</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f8f9fa;
            color: #333;
            padding: 24px;
        }
        h1 {
            margin-bottom: 2rem;
            color: #2c3e50;
            text-align: center;
        }
        .container {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 980px;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-align: center;
            text-decoration: none;
            color: inherit;
            width: 250px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 2px solid transparent;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-color: #ff6b6b;
        }
        .card:nth-child(2):hover {
            border-color: #37352f;
        }
        .card:nth-child(3):hover {
            border-color: #8b5cf6;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.5rem;
        }
        p {
            margin: 0;
            color: #666;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1>欢迎来到我的秘密岛屿 🏝️</h1>
    <div class="container">
        <a href="magic.html" class="card">
            <div class="icon">✨</div>
            <h2>魔法实验室</h2>
            <p>包含 3D 悬浮卡片、粒子特效与鼠标拖尾的趣味交互页面</p>
        </a>
        <a href="notion.html" class="card">
            <div class="icon">📝</div>
            <h2>Mini Notion</h2>
            <p>基于本地存储的无干扰极简编辑器</p>
        </a>
        <a href="secret-diary.html" class="card">
            <div class="icon">🤍</div>
            <h2>秘密日记</h2>
            <p>写给自己看的私密房间，支持本地保存、心情标签、搜索与导出</p>
        </a>
    </div>
</body>
</html>
