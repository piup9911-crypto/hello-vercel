<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个 Vercel 网站</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            color: #333;
        }
        h1 {
            font-size: 3rem;
            color: #0070f3;
        }
        p {

        }

<body>
    <div class="card">
        <h1>Hello World! 👋</h1>
        <p>这是我部署在 Vercel 上的第一个网页。</p>

</html>
