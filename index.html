<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人应用集</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f8f9fa;
            color: #333;
            padding: 24px;
        }
        h1 {
            margin-bottom: 2rem;
            color: #2c3e50;
            text-align: center;
        }
        .container {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 980px;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-align: center;
            text-decoration: none;
            color: inherit;
            width: 250px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 2px solid transparent;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-color: #ff6b6b;
        }
        .card:nth-child(2):hover {
            border-color: #37352f;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.5rem;
        }
        p {
            margin: 0;
            color: #666;
            line-height: 1.5;
        }
        .secret-trigger {
            position: fixed;
            right: 22px;
            bottom: 20px;
            width: 42px;
            height: 42px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #c4b5fd;
            background: rgba(255,255,255,0.42);
            border: 1px solid rgba(196,181,253,0.28);
            box-shadow: 0 10px 24px rgba(139,92,246,0.08);
            backdrop-filter: blur(10px);
            opacity: 0.42;
            transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            font-size: 14px;
        }
        .secret-trigger:hover {
            opacity: 0.95;
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(139,92,246,0.14);
            border-color: rgba(139,92,246,0.48);
        }
        .secret-trigger:focus-visible {
            opacity: 1;
            outline: none;
            box-shadow: 0 0 0 4px rgba(139,92,246,0.12), 0 14px 30px rgba(139,92,246,0.16);
        }
        .secret-dot {
            line-height: 1;
            transform: translateY(-1px);
        }
        @media (max-width: 720px) {
            .secret-trigger {
                right: 16px;
                bottom: 16px;
            }
        }
    </style>
</head>
<body>
    <h1>欢迎来到我的秘密岛屿 🏝️</h1>
    <div class="container">
        <a href="magic.html" class="card">
            <div class="icon">✨</div>
            <h2>魔法实验室</h2>
            <p>包含 3D 悬浮卡片、粒子特效与鼠标拖尾的趣味交互页面</p>
        </a>
        <a href="notion.html" class="card">
            <div class="icon">📝</div>
            <h2>Mini Notion</h2>
            <p>基于本地存储的无干扰极简编辑器</p>
        </a>
    </div>
    <a href="secret-diary.html" class="secret-trigger" aria-label="打开秘密日记" title="打开秘密日记">
        <span class="secret-dot">✦</span>
    </a>
</body>
</html>
