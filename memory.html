<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>独立记忆系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="shared/supabase-auth.js"></script>
    <style>
        :root {
            --bg: #f7f4ed;
            --panel: rgba(255, 255, 255, 0.9);
            --panel-strong: rgba(255, 255, 255, 0.98);
            --text: #302a22;
            --muted: #7a6f61;
            --line: #eadfce;
            --primary: #9a6b36;
            --primary-strong: #7d5124;
            --primary-soft: rgba(154, 107, 54, 0.12);
            --green: #2f855a;
            --red: #c2410c;
            --shadow: 0 24px 70px rgba(96, 66, 35, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 24px;
            color: var(--text);
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), transparent 30%),
                radial-gradient(circle at right 12%, rgba(222, 186, 132, 0.24), transparent 28%),
                linear-gradient(145deg, #fffdf8 0%, var(--bg) 55%, #f4fbf6 100%);
        }

        button,
        textarea,
        input {
            font: inherit;
        }

        .shell {
            width: min(100%, 1160px);
            margin: 0 auto;
            display: grid;
            gap: 18px;
        }

        .panel {
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.72);
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            padding: 26px;
        }

        .topbar,
        .row,
        .section-head,
        .actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .eyebrow,
        .chip,
        .badge {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            border-radius: 999px;
            font-weight: 700;
        }

        .eyebrow {
            padding: 8px 14px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.82);
            color: var(--muted);
            font-size: 13px;
        }

        .chip,
        .badge {
            padding: 6px 10px;
            font-size: 12px;
            color: var(--muted);
            background: rgba(48, 42, 34, 0.06);
        }

        .badge.readable {
            color: var(--green);
            background: rgba(47, 133, 90, 0.12);
        }

        .badge.private {
            color: var(--red);
            background: rgba(194, 65, 12, 0.1);
        }

        h1 {
            margin: 18px 0 10px;
            font-size: clamp(34px, 6vw, 58px);
            line-height: 1.05;
        }

        h2 {
            margin: 0;
            font-size: 22px;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.75;
        }

        .lead {
            max-width: 68ch;
            font-size: 15px;
        }

        .nav-grid,
        .memory-grid {
            display: grid;
            gap: 14px;
        }

        .nav-grid {
            grid-template-columns: repeat(5, minmax(0, 1fr));
        }

        .section-tab {
            border: 1px solid var(--line);
            border-radius: 22px;
            padding: 16px;
            color: inherit;
            background: var(--panel-strong);
            cursor: pointer;
            text-align: left;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .section-tab:hover,
        .section-tab.active {
            transform: translateY(-2px);
            border-color: rgba(154, 107, 54, 0.34);
            box-shadow: 0 16px 34px rgba(154, 107, 54, 0.14);
        }

        .section-tab.active {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.98), rgba(154, 107, 54, 0.1));
        }

        .tab-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .tab-note {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .editor-grid {
            display: grid;
            grid-template-columns: 220px minmax(0, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        input,
        textarea,
        select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.92);
            color: var(--text);
            padding: 14px 15px;
            outline: none;
        }

        textarea {
            min-height: 132px;
            resize: vertical;
            line-height: 1.7;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: rgba(154, 107, 54, 0.42);
            box-shadow: 0 0 0 4px rgba(154, 107, 54, 0.08);
        }

        .button {
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 10px 14px;
            min-height: 42px;
            color: inherit;
            background: var(--panel-strong);
            cursor: pointer;
            text-decoration: none;
            font-weight: 800;
        }

        .button.primary {
            border-color: transparent;
            color: white;
            background: linear-gradient(135deg, var(--primary) 0%, #c28b49 100%);
            box-shadow: 0 14px 30px rgba(154, 107, 54, 0.2);
        }

        .button.danger {
            border-color: rgba(194, 65, 12, 0.22);
            color: var(--red);
            background: rgba(194, 65, 12, 0.08);
        }

        .button:disabled {
            cursor: wait;
            opacity: 0.64;
        }

        .memory-grid {
            margin-top: 16px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .memory-card {
            display: grid;
            gap: 12px;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: var(--panel-strong);
            padding: 18px;
        }

        .memory-card textarea {
            min-height: 110px;
            max-height: 420px;
        }

        .meta {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.6;
        }

        .empty {
            border: 1px dashed rgba(154, 107, 54, 0.3);
            border-radius: 24px;
            padding: 24px;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.6);
            text-align: center;
            line-height: 1.8;
        }

        .feedback {
            min-height: 24px;
            margin-top: 12px;
            color: var(--muted);
            line-height: 1.6;
        }

        .feedback.error {
            color: var(--red);
        }

        .feedback.success {
            color: var(--green);
        }

        @media (max-width: 920px) {
            .nav-grid,
            .memory-grid,
            .editor-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 14px;
            }

            .panel {
                padding: 20px;
                border-radius: 24px;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="panel">
            <div class="topbar">
                <div class="eyebrow">独立记忆系统 · 云端版</div>
                <div class="row">
                    <a class="button" href="bridge-tools.html">Gemini 工具桥</a>
                    <a class="button" href="index.html">返回首页</a>
                </div>
            </div>
            <h1>一个记忆系统，五个清楚的区域。</h1>
            <p class="lead">
                这里已经不再以“待确认 / 已确认”为主结构。新系统把记忆分成长期记忆、小总结、大总结、私密记忆和垃圾箱；
                只有长期记忆、小总结和大总结会被模型读取，私密记忆与垃圾箱只给你自己留档。
            </p>
            <div class="row" style="margin-top: 18px;">
                <div class="chip" id="user-email">正在连接账号</div>
                <div class="chip" id="memory-count">正在读取记忆</div>
            </div>
        </section>

        <section class="nav-grid" id="section-tabs"></section>

        <section class="panel">
            <div class="section-head">
                <div>
                    <h2>新增记忆</h2>
                    <p id="section-note">选择一个区域，然后写入新的记忆文本。</p>
                </div>
                <button class="button" id="reload-btn" type="button">重新读取</button>
            </div>
            <div class="editor-grid">
                <div>
                    <select id="new-section"></select>
                    <input id="new-title" style="margin-top: 12px;" placeholder="标题，可留空">
                </div>
                <div>
                    <textarea id="new-content" placeholder="写一条新的记忆。建议简洁、明确，只放真的值得留住的内容。"></textarea>
                    <div class="actions" style="margin-top: 12px;">
                        <button class="button primary" id="create-btn" type="button">保存到当前区域</button>
                        <div class="feedback" id="feedback"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="section-head">
                <div>
                    <h2 id="active-title">长期记忆</h2>
                    <p id="active-description">你筛选过、希望模型长期读取的稳定记忆。</p>
                </div>
                <div class="badge readable" id="readable-badge">模型会读取</div>
            </div>
            <div class="memory-grid" id="memory-list"></div>
        </section>
    </main>

    <script>
        const SECTIONS = [
            {
                id: "long_term",
                title: "长期记忆",
                icon: "◆",
                readable: true,
                note: "稳定、重要、你确认想让模型长期记住的内容。"
            },
            {
                id: "large_summary",
                title: "大总结",
                icon: "◈",
                readable: true,
                note: "由多个小总结合成的阶段性背景。"
            },
            {
                id: "small_summary",
                title: "小总结",
                icon: "◇",
                readable: true,
                note: "近期对话的轻量摘要，只保留少量给模型参考。"
            },
            {
                id: "private",
                title: "私密记忆",
                icon: "◌",
                readable: false,
                note: "只给你自己留档，模型不会读取。"
            },
            {
                id: "trash",
                title: "垃圾箱",
                icon: "×",
                readable: false,
                note: "准备丢弃或等待你最后处理的内容。"
            }
        ];

        const API_URL = "/api/independent-memory";
        const LIVE_URL = "https://hello-vercel-blush-eight.vercel.app/memory.html";
        const tabs = document.getElementById("section-tabs");
        const userEmail = document.getElementById("user-email");
        const memoryCount = document.getElementById("memory-count");
        const newSection = document.getElementById("new-section");
        const newTitle = document.getElementById("new-title");
        const newContent = document.getElementById("new-content");
        const createBtn = document.getElementById("create-btn");
        const reloadBtn = document.getElementById("reload-btn");
        const feedback = document.getElementById("feedback");
        const activeTitle = document.getElementById("active-title");
        const activeDescription = document.getElementById("active-description");
        const readableBadge = document.getElementById("readable-badge");
        const memoryList = document.getElementById("memory-list");
        const sectionNote = document.getElementById("section-note");

        let accessToken = "";
        let activeSection = "long_term";
        let bundle = {
            records: [],
            sections: {}
        };

        function sectionMeta(sectionId) {
            return SECTIONS.find((section) => section.id === sectionId) || SECTIONS[0];
        }

        function setFeedback(message, type = "") {
            feedback.textContent = message || "";
            feedback.className = `feedback ${type}`.trim();
        }

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function formatTime(value) {
            if (!value) return "未知时间";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return "未知时间";
            return date.toLocaleString("zh-CN", {
                hour12: false,
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        function sectionRecords(sectionId) {
            return (bundle.sections && bundle.sections[sectionId]) || [];
        }

        function renderTabs() {
            tabs.innerHTML = SECTIONS.map((section) => {
                const count = sectionRecords(section.id).length;
                return `
                    <button class="section-tab ${section.id === activeSection ? "active" : ""}" data-section="${section.id}" type="button">
                        <div class="tab-title">
                            <span>${section.icon} ${section.title}</span>
                            <span class="chip">${count}</span>
                        </div>
                        <div class="tab-note">${section.note}</div>
                    </button>
                `;
            }).join("");
        }

        function renderSectionOptions() {
            newSection.innerHTML = SECTIONS.map((section) => `
                <option value="${section.id}">${section.title}</option>
            `).join("");
            newSection.value = activeSection;
        }

        function renderSummary() {
            const counts = SECTIONS.map((section) => `${section.title} ${sectionRecords(section.id).length}`);
            memoryCount.textContent = counts.join(" · ");
        }

        function renderActiveHeader() {
            const meta = sectionMeta(activeSection);
            activeTitle.textContent = meta.title;
            activeDescription.textContent = meta.note;
            sectionNote.textContent = `当前会保存到：${meta.title}。${meta.readable ? "这个区域会被模型读取。" : "这个区域不会被模型读取。"}`;
            readableBadge.textContent = meta.readable ? "模型会读取" : "模型不会读取";
            readableBadge.className = `badge ${meta.readable ? "readable" : "private"}`;
            newSection.value = activeSection;
        }

        function actionButtons(record) {
            if (record.virtual) {
                return '<button class="button primary" data-action="save" type="button">保存编辑</button>';
            }

            if (activeSection === "trash") {
                return `
                    <button class="button primary" data-action="restore-long-term" type="button">恢复到长期记忆</button>
                    <button class="button" data-action="restore-private" type="button">放入私密记忆</button>
                    <button class="button danger" data-action="delete" type="button">永久删除</button>
                `;
            }

            return `
                <button class="button primary" data-action="save" type="button">保存编辑</button>
                <button class="button" data-action="move-long-term" type="button">放入长期记忆</button>
                <button class="button" data-action="move-private" type="button">放入私密记忆</button>
                <button class="button danger" data-action="move-trash" type="button">移到垃圾箱</button>
            `;
        }

        function renderRecord(record) {
            const meta = sectionMeta(record.section);
            const title = record.title || meta.title;
            const readable = record.modelReadable ? "模型会读取" : "模型不会读取";
            const readableClass = record.modelReadable ? "readable" : "private";

            return `
                <article class="memory-card" data-id="${escapeHtml(record.id)}" data-section="${escapeHtml(record.section)}" data-metadata="${escapeHtml(encodeURIComponent(JSON.stringify(record.metadata || {})))}">
                    <div class="row">
                        <span class="badge ${readableClass}">${readable}</span>
                        <span class="meta">${record.virtual ? "旧手动共享记忆" : escapeHtml(record.status || "memory")}</span>
                    </div>
                    <input class="record-title" value="${escapeHtml(title)}" ${record.virtual ? "readonly" : ""}>
                    <textarea class="record-content">${escapeHtml(record.content || "")}</textarea>
                    <div class="meta">
                        更新时间：${escapeHtml(formatTime(record.updatedAt))}
                        ${record.trashedAt ? ` · 入垃圾箱：${escapeHtml(formatTime(record.trashedAt))}` : ""}
                    </div>
                    <div class="actions">
                        ${actionButtons(record)}
                    </div>
                </article>
            `;
        }

        function renderRecords() {
            const records = sectionRecords(activeSection);
            if (!records.length) {
                memoryList.innerHTML = `<div class="empty">这个区域现在是空的。你可以在上方新增一条，或者从其他区域移动过来。</div>`;
                return;
            }

            memoryList.innerHTML = records.map(renderRecord).join("");
        }

        function renderAll() {
            renderTabs();
            renderSectionOptions();
            renderSummary();
            renderActiveHeader();
            renderRecords();
        }

        async function requestJson(url, options = {}) {
            const response = await fetch(url, {
                ...options,
                headers: {
                    Authorization: `Bearer ${accessToken}`,
                    "Content-Type": "application/json",
                    ...(options.headers || {})
                }
            });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw new Error(payload.error || `Request failed with ${response.status}`);
            }
            return payload;
        }

        async function loadAll() {
            setFeedback("正在读取云端独立记忆...");
            bundle = await requestJson(API_URL);
            renderAll();
            setFeedback("已读取最新独立记忆。", "success");
        }

        async function createMemory() {
            const section = newSection.value || activeSection;
            const content = newContent.value.trim();
            if (!content) {
                setFeedback("先写一点记忆内容再保存。", "error");
                return;
            }

            createBtn.disabled = true;
            try {
                await requestJson(API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        section,
                        title: newTitle.value.trim(),
                        content
                    })
                });
                newTitle.value = "";
                newContent.value = "";
                activeSection = section;
                await loadAll();
                setFeedback("新记忆已经保存。", "success");
            } catch (error) {
                setFeedback(window.AppAuth ? window.AppAuth.humanizeError(error) : String(error), "error");
            } finally {
                createBtn.disabled = false;
            }
        }

        function sectionForAction(action, currentSection) {
            if (action === "move-long-term" || action === "restore-long-term") return "long_term";
            if (action === "move-private" || action === "restore-private") return "private";
            if (action === "move-trash") return "trash";
            return currentSection;
        }

        async function saveCard(card, action) {
            const id = card.dataset.id;
            const currentSection = card.dataset.section || activeSection;
            const section = sectionForAction(action, currentSection);
            const title = card.querySelector(".record-title").value.trim();
            const content = card.querySelector(".record-content").value.trim();
            const metadata = card.dataset.metadata
                ? JSON.parse(decodeURIComponent(card.dataset.metadata))
                : {};

            if (action === "delete") {
                if (!confirm("确定永久删除这条记忆吗？这个操作不能撤回。")) return;
                await requestJson(`${API_URL}?id=${encodeURIComponent(id)}`, {
                    method: "DELETE"
                });
                await loadAll();
                setFeedback("已永久删除。", "success");
                return;
            }

            await requestJson(API_URL, {
                method: "PATCH",
                body: JSON.stringify({
                    id,
                    section,
                    title,
                    content,
                    metadata
                })
            });
            activeSection = section;
            await loadAll();
            setFeedback("记忆已更新。", "success");
        }

        tabs.addEventListener("click", (event) => {
            const tab = event.target.closest("[data-section]");
            if (!tab) return;
            activeSection = tab.dataset.section;
            renderAll();
        });

        newSection.addEventListener("change", () => {
            activeSection = newSection.value;
            renderAll();
        });

        createBtn.addEventListener("click", createMemory);
        reloadBtn.addEventListener("click", () => {
            loadAll().catch((error) => {
                setFeedback(window.AppAuth ? window.AppAuth.humanizeError(error) : String(error), "error");
            });
        });

        memoryList.addEventListener("click", async (event) => {
            const button = event.target.closest("button[data-action]");
            if (!button) return;
            const card = button.closest("[data-id]");
            if (!card) return;

            button.disabled = true;
            try {
                await saveCard(card, button.dataset.action);
            } catch (error) {
                setFeedback(window.AppAuth ? window.AppAuth.humanizeError(error) : String(error), "error");
            } finally {
                button.disabled = false;
            }
        });

        async function bootstrap() {
            if (window.location.protocol === "file:") {
                userEmail.textContent = "本地 file:// 预览不可用";
                memoryCount.textContent = "请打开线上页面";
                memoryList.innerHTML = `<div class="empty">这个页面依赖登录态和网站 API，不能直接用 file:// 打开。请使用：${LIVE_URL}</div>`;
                return;
            }

            if (!window.AppAuth) {
                throw new Error("Supabase auth script failed to load.");
            }

            const authState = await window.AppAuth.requireUser();
            if (authState.redirected) {
                return;
            }

            accessToken = authState.session ? authState.session.access_token : "";
            userEmail.textContent =
                authState.user && authState.user.email ? authState.user.email : "已登录";
            await loadAll();
        }

        renderTabs();
        renderSectionOptions();
        bootstrap().catch((error) => {
            setFeedback(window.AppAuth ? window.AppAuth.humanizeError(error) : String(error), "error");
        });
    </script>
</body>
</html>
