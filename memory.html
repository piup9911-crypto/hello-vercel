<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>独立记忆系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="shared/supabase-auth.js"></script>
    <style>
        :root {
            --bg: #f7f4ed;
            --panel: rgba(255, 255, 255, 0.9);
            --panel-strong: rgba(255, 255, 255, 0.98);
            --text: #302a22;
            --muted: #7a6f61;
            --line: #eadfce;
            --primary: #9a6b36;
            --primary-strong: #7d5124;
            --primary-soft: rgba(154, 107, 54, 0.12);
            --green: #2f855a;
            --red: #c2410c;
            --shadow: 0 24px 70px rgba(96, 66, 35, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 24px;
            color: var(--text);
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), transparent 30%),
                radial-gradient(circle at right 12%, rgba(222, 186, 132, 0.24), transparent 28%),
                linear-gradient(145deg, #fffdf8 0%, var(--bg) 55%, #f4fbf6 100%);
        }

        button,
        textarea,
        input {
            font: inherit;
        }

        .shell {
            width: min(100%, 1160px);
            margin: 0 auto;
            display: grid;
            gap: 18px;
        }

        .panel {
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.72);
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            padding: 26px;
        }

        .topbar,
        .row,
        .section-head,
        .actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .eyebrow,
        .chip,
        .badge {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            border-radius: 999px;
            font-weight: 700;
        }

        .eyebrow {
            padding: 8px 14px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.82);
            color: var(--muted);
            font-size: 13px;
        }

        .chip,
        .badge {
            padding: 6px 10px;
            font-size: 12px;
            color: var(--muted);
            background: rgba(48, 42, 34, 0.06);
        }

        .badge.readable {
            color: var(--green);
            background: rgba(47, 133, 90, 0.12);
        }

        .badge.private {
            color: var(--red);
            background: rgba(194, 65, 12, 0.1);
        }

        h1 {
            margin: 18px 0 10px;
            font-size: clamp(34px, 6vw, 58px);
            line-height: 1.05;
        }

        h2 {
            margin: 0;
            font-size: 22px;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.75;
        }

        .lead {
            max-width: 68ch;
            font-size: 15px;
        }

        .hidden {
            display: none !important;
        }

        .nav-grid,
        .memory-grid {
            display: grid;
            gap: 14px;
        }

        .nav-grid {
            grid-template-columns: repeat(5, minmax(0, 1fr));
        }

        .section-tab {
            border: 1px solid var(--line);
            border-radius: 22px;
            padding: 16px;
            color: inherit;
            background: var(--panel-strong);
            cursor: pointer;
            text-align: left;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .section-tab:hover,
        .section-tab.active {
            transform: translateY(-2px);
            border-color: rgba(154, 107, 54, 0.34);
            box-shadow: 0 16px 34px rgba(154, 107, 54, 0.14);
        }

        .section-tab.active {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.98), rgba(154, 107, 54, 0.1));
        }

        .section-tab.secondary {
            opacity: 0.82;
        }

        .tab-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .tab-note {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .editor-grid {
            display: grid;
            grid-template-columns: 220px minmax(0, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        input,
        textarea,
        select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.92);
            color: var(--text);
            padding: 14px 15px;
            outline: none;
        }

        textarea {
            min-height: 132px;
            resize: vertical;
            line-height: 1.7;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: rgba(154, 107, 54, 0.42);
            box-shadow: 0 0 0 4px rgba(154, 107, 54, 0.08);
        }

        .button {
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 10px 14px;
            min-height: 42px;
            color: inherit;
            background: var(--panel-strong);
            cursor: pointer;
            text-decoration: none;
            font-weight: 800;
        }

        .button.primary {
            border-color: transparent;
            color: white;
            background: linear-gradient(135deg, var(--primary) 0%, #c28b49 100%);
            box-shadow: 0 14px 30px rgba(154, 107, 54, 0.2);
        }

        .button.danger {
            border-color: rgba(194, 65, 12, 0.22);
            color: var(--red);
            background: rgba(194, 65, 12, 0.08);
        }

        .button:disabled {
            cursor: wait;
            opacity: 0.64;
        }

        /* 烬的修改注：这里故意把已保存记忆改回旧系统的轻列表样式。
           记忆页的重点是“读和微调”，不是像后台管理系统一样每条都挂满按钮。 */
        .memory-grid {
            margin-top: 16px;
            display: block;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: var(--panel-strong);
            padding: 8px 18px;
            box-shadow: 0 18px 50px rgba(96, 66, 35, 0.1);
        }

        .memory-card {
            position: relative;
            display: grid;
            gap: 8px;
            border: none;
            border-bottom: 1px solid var(--line);
            border-radius: 0;
            background: transparent;
            padding: 16px 4px;
            box-shadow: none;
        }

        .memory-card:last-child {
            border-bottom: none;
        }

        .memory-card.editing {
            margin: 4px -8px;
            padding: 16px 12px;
            border-radius: 18px;
            background: rgba(154, 107, 54, 0.07);
        }

        .memory-grid.bulk-mode .memory-card {
            padding-left: 44px;
        }

        .bulk-select-wrap {
            display: none;
        }

        .memory-grid.bulk-mode .bulk-select-wrap {
            position: absolute;
            top: 18px;
            left: 6px;
            display: block;
        }

        .bulk-checkbox {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .memory-card .row {
            justify-content: flex-start;
        }

        .record-title,
        .record-content {
            border-color: transparent;
            background: transparent;
            padding: 4px 8px;
            border-radius: 12px;
        }

        .record-title {
            min-height: 34px;
            font-weight: 800;
        }

        /* 烬的修改注：系统默认标题只用于编辑时兜底，不在阅读态展示。
           这类标题本身没有信息量，露出来只会制造重复噪音。 */
        .record-title.generic-title {
            display: none;
        }

        .memory-card.editing .record-title.generic-title {
            display: block;
            opacity: 0.82;
        }

        .record-content {
            min-height: 0;
            resize: none;
            overflow: hidden;
            line-height: 1.75;
        }

        .memory-card:not(.editing) .record-title,
        .memory-card:not(.editing) .record-content {
            cursor: pointer;
        }

        .memory-card:not(.editing) .record-title:focus,
        .memory-card:not(.editing) .record-content:focus {
            box-shadow: none;
        }

        .memory-card:not(.editing):hover .record-content {
            background: rgba(154, 107, 54, 0.06);
        }

        .memory-card.editing .record-title,
        .memory-card.editing .record-content {
            border-color: rgba(154, 107, 54, 0.28);
            background: rgba(255, 255, 255, 0.95);
        }

        /* 烬的修改注：操作按钮默认隐藏，只在长按进入编辑态后出现。
           这段不要轻易删，不然页面又会退回每条记忆一排按钮的臃肿状态。 */
        .memory-card .actions {
            display: none;
            justify-content: flex-end;
            margin-top: 4px;
        }

        .memory-card.editing .actions {
            display: flex;
        }

        .meta {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.6;
        }

        .empty {
            border: 1px dashed rgba(154, 107, 54, 0.3);
            border-radius: 24px;
            padding: 24px;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.6);
            text-align: center;
            line-height: 1.8;
        }

        .feedback {
            min-height: 24px;
            margin-top: 12px;
            color: var(--muted);
            line-height: 1.6;
        }

        .feedback.error {
            color: var(--red);
        }

        .feedback.success {
            color: var(--green);
        }

        /* 烬的修改注：批量操作只作为临时模式出现，默认隐藏。
           这样满足批量整理需求，又不会破坏旧系统那种干净的记忆清单观感。 */
        .bulk-toolbar {
            display: grid;
            gap: 12px;
            margin: 16px 0 0;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.68);
        }

        .bulk-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .bulk-actions select {
            width: min(100%, 220px);
            min-height: 42px;
            padding: 10px 12px;
            border-radius: 999px;
        }

        .sheet-backdrop {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: grid;
            place-items: end center;
            padding: 18px;
            background: rgba(48, 42, 34, 0.24);
            backdrop-filter: blur(8px);
        }

        .sheet-panel {
            width: min(100%, 560px);
            display: grid;
            gap: 14px;
            border: 1px solid var(--line);
            border-radius: 26px;
            background: var(--panel-strong);
            box-shadow: var(--shadow);
            padding: 18px;
        }

        .sheet-actions {
            display: grid;
            gap: 10px;
        }

        @media (max-width: 920px) {
            .nav-grid,
            .editor-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 14px;
            }

            .panel {
                padding: 20px;
                border-radius: 24px;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="panel">
            <div class="topbar">
                <div class="eyebrow">独立记忆系统 · 云端版</div>
                <div class="row">
                    <a class="button" href="bridge-tools.html">Gemini 工具桥</a>
                    <a class="button" href="index.html">返回首页</a>
                </div>
            </div>
            <h1>一个记忆系统，五个清楚的区域。</h1>
            <p class="lead">
                这里已经不再以“待确认 / 已确认”为主结构。新系统把记忆分成长期记忆、小总结、大总结、私密记忆和垃圾箱；
                页面会尽量只展示真正的记忆文本，系统状态和数据库标签都藏到背后。
            </p>
            <div class="row" style="margin-top: 18px;">
                <div class="chip" id="user-email">正在连接账号</div>
                <div class="chip" id="memory-count">正在读取记忆</div>
            </div>
        </section>

        <section class="nav-grid" id="section-tabs"></section>

        <section class="panel">
            <div class="section-head">
                <div>
                    <h2>新增记忆</h2>
                    <p id="section-note">选择一个区域，然后写入新的记忆文本。</p>
                </div>
                <div class="row">
                    <button class="button" id="reload-btn" type="button">重新读取</button>
                    <button class="button primary" id="create-toggle-btn" type="button">写入一条记忆</button>
                </div>
            </div>
            <div class="feedback" id="feedback"></div>
            <div class="editor-grid hidden" id="create-body">
                <div>
                    <select id="new-section"></select>
                    <input id="new-title" style="margin-top: 12px;" placeholder="标题，可留空">
                </div>
                <div>
                    <textarea id="new-content" placeholder="写一条新的记忆。建议简洁、明确，只放真的值得留住的内容。"></textarea>
                    <div class="actions" style="margin-top: 12px;">
                        <button class="button primary" id="create-btn" type="button">保存到当前区域</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="section-head">
                <div>
                    <h2 id="active-title">长期记忆</h2>
                    <p id="active-description">你筛选过、希望长期保存的稳定记忆。</p>
                </div>
                <div class="badge readable" id="readable-badge">0 条</div>
            </div>
            <div class="bulk-toolbar hidden" id="bulk-toolbar">
                <div class="row">
                    <div>
                        <strong>批量整理</strong>
                        <div class="meta" id="bulk-selected-label">已选 0 条</div>
                    </div>
                    <button class="button" id="bulk-mode-btn" type="button">批量操作</button>
                </div>
                <div class="bulk-actions hidden" id="bulk-actions">
                    <button class="button" id="bulk-select-all-btn" type="button">全选</button>
                    <select id="bulk-target"></select>
                    <button class="button primary" id="bulk-move-btn" type="button">移动所选</button>
                    <button class="button danger" id="bulk-delete-btn" type="button">删除所选</button>
                    <button class="button" id="bulk-cancel-btn" type="button">退出批量</button>
                </div>
            </div>
            <div class="memory-grid" id="memory-list"></div>
        </section>
    </main>

    <div class="sheet-backdrop hidden" id="memory-action-sheet" aria-hidden="true">
        <div class="sheet-panel">
            <div>
                <h2>记忆操作</h2>
                <!-- 烬的修改注：这里复刻旧系统“长按后再操作”的交互。
                     这样已保存记忆默认只像清单，不会被编辑/删除按钮挤得很吵。 -->
                <p>长按某条记忆后，在这里选择编辑、移动或删除。点击空白处即可关闭。</p>
            </div>
            <div class="sheet-actions" id="memory-sheet-actions"></div>
        </div>
    </div>

    <script>
        const SECTIONS = [
            {
                id: "long_term",
                title: "长期记忆",
                icon: "◆",
                readable: true,
                note: "稳定、重要、你确认想长期保存的内容。"
            },
            {
                id: "large_summary",
                title: "大总结",
                icon: "◈",
                readable: true,
                note: "由多个小总结合成的阶段性背景。"
            },
            {
                id: "small_summary",
                title: "小总结",
                icon: "◇",
                readable: true,
                note: "近期对话的轻量摘要，只保留少量关键背景。"
            },
            {
                id: "private",
                title: "私密记忆",
                icon: "◌",
                readable: false,
                note: "只给你自己留档，不混进日常对话背景。"
            },
            {
                id: "trash",
                title: "垃圾箱",
                icon: "×",
                readable: false,
                note: "准备丢弃或等待你最后处理的内容。"
            }
        ];

        const API_URL = "/api/independent-memory";
        const LIVE_URL = "https://hello-vercel-blush-eight.vercel.app/memory.html";
        const tabs = document.getElementById("section-tabs");
        const userEmail = document.getElementById("user-email");
        const memoryCount = document.getElementById("memory-count");
        const newSection = document.getElementById("new-section");
        const newTitle = document.getElementById("new-title");
        const newContent = document.getElementById("new-content");
        const createBtn = document.getElementById("create-btn");
        const createToggleBtn = document.getElementById("create-toggle-btn");
        const createBody = document.getElementById("create-body");
        const reloadBtn = document.getElementById("reload-btn");
        const feedback = document.getElementById("feedback");
        const activeTitle = document.getElementById("active-title");
        const activeDescription = document.getElementById("active-description");
        const readableBadge = document.getElementById("readable-badge");
        const memoryList = document.getElementById("memory-list");
        const sectionNote = document.getElementById("section-note");
        const bulkToolbar = document.getElementById("bulk-toolbar");
        const bulkModeBtn = document.getElementById("bulk-mode-btn");
        const bulkActions = document.getElementById("bulk-actions");
        const bulkSelectedLabel = document.getElementById("bulk-selected-label");
        const bulkSelectAllBtn = document.getElementById("bulk-select-all-btn");
        const bulkTarget = document.getElementById("bulk-target");
        const bulkMoveBtn = document.getElementById("bulk-move-btn");
        const bulkDeleteBtn = document.getElementById("bulk-delete-btn");
        const bulkCancelBtn = document.getElementById("bulk-cancel-btn");
        const memoryActionSheet = document.getElementById("memory-action-sheet");
        const memorySheetActions = document.getElementById("memory-sheet-actions");

        let accessToken = "";
        let activeSection = "long_term";
        let isCreateOpen = false;
        let isBulkMode = false;
        let memoryActionTargetId = "";
        let memoryLongPressTimer = null;
        let memoryPointerCard = null;
        let bundle = {
            records: [],
            sections: {}
        };

        function sectionMeta(sectionId) {
            return SECTIONS.find((section) => section.id === sectionId) || SECTIONS[0];
        }

        function setFeedback(message, type = "") {
            feedback.textContent = message || "";
            feedback.className = `feedback ${type}`.trim();
        }

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function formatTime(value) {
            if (!value) return "未知时间";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return "未知时间";
            return date.toLocaleString("zh-CN", {
                hour12: false,
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        function setCreateOpen(open) {
            isCreateOpen = open;
            createBody.classList.toggle("hidden", !open);
            createToggleBtn.textContent = open ? "收起写入框" : "写入一条记忆";
        }

        function autoResizeTextarea(textarea) {
            if (!textarea) return;
            textarea.style.height = "auto";
            const lineHeight = parseFloat(window.getComputedStyle(textarea).lineHeight) || 24;
            const maxLines = Number(textarea.dataset.maxLines || 20);
            const maxHeight = lineHeight * maxLines + 18;
            const nextHeight = Math.min(textarea.scrollHeight, maxHeight);
            textarea.style.height = `${nextHeight}px`;
            textarea.style.overflowY = textarea.scrollHeight > maxHeight ? "auto" : "hidden";
        }

        function resizeMemoryTextareas(scope = memoryList) {
            scope.querySelectorAll(".record-content").forEach(autoResizeTextarea);
        }

        function sectionRecords(sectionId) {
            return (bundle.sections && bundle.sections[sectionId]) || [];
        }

        function canBulkOperateSection(sectionId = activeSection) {
            return sectionId !== "small_summary";
        }

        function bulkRecords(sectionId = activeSection) {
            return canBulkOperateSection(sectionId)
                ? sectionRecords(sectionId).filter((record) => !record.virtual)
                : [];
        }

        function bulkTargetSections() {
            return SECTIONS.filter((section) =>
                section.id !== activeSection &&
                section.id !== "small_summary" &&
                section.id !== "trash"
            );
        }

        function selectedBulkCards() {
            return Array.from(memoryList.querySelectorAll(".bulk-checkbox:checked"))
                .map((checkbox) => checkbox.closest("[data-id]"))
                .filter(Boolean);
        }

        function updateBulkToolbar() {
            const availableRecords = bulkRecords();
            const canOperate = availableRecords.length > 0;
            if (!canOperate) {
                isBulkMode = false;
            }

            bulkToolbar.classList.toggle("hidden", !canOperate);
            bulkModeBtn.classList.toggle("hidden", isBulkMode);
            bulkActions.classList.toggle("hidden", !isBulkMode);
            memoryList.classList.toggle("bulk-mode", isBulkMode);

            const selectedCount = selectedBulkCards().length;
            bulkSelectedLabel.textContent = isBulkMode
                ? `已选 ${selectedCount} 条`
                : "小总结之外的分区可批量整理";

            bulkTarget.innerHTML = bulkTargetSections().map((section) =>
                `<option value="${section.id}">${section.title}</option>`
            ).join("");
            const hasTarget = bulkTarget.options.length > 0;
            bulkMoveBtn.disabled = !selectedCount || !hasTarget;
            bulkDeleteBtn.disabled = !selectedCount;
            bulkSelectAllBtn.disabled = !availableRecords.length;
            bulkSelectAllBtn.textContent =
                selectedCount && selectedCount === availableRecords.length ? "取消全选" : "全选";
            bulkDeleteBtn.textContent = activeSection === "trash" ? "永久删除所选" : "删除所选";
        }

        function renderTabs() {
            tabs.innerHTML = SECTIONS.map((section) => {
                const count = sectionRecords(section.id).length;
                const tabTone = section.readable ? "" : " secondary";
                return `
                    <button class="section-tab${tabTone} ${section.id === activeSection ? "active" : ""}" data-section="${section.id}" type="button">
                        <div class="tab-title">
                            <span>${section.icon} ${section.title}</span>
                            <span class="chip">${count}</span>
                        </div>
                        <div class="tab-note">${section.note}</div>
                    </button>
                `;
            }).join("");
        }

        function renderSectionOptions() {
            newSection.innerHTML = SECTIONS.map((section) => `
                <option value="${section.id}">${section.title}</option>
            `).join("");
            newSection.value = activeSection;
        }

        function renderSummary() {
            const counts = SECTIONS.map((section) => `${section.title} ${sectionRecords(section.id).length}`);
            memoryCount.textContent = counts.join(" · ");
        }

        function isGenericTitle(title, record) {
            const value = String(title || "").trim();
            const meta = sectionMeta(record.section);
            if (record.virtual) {
                return true;
            }
            const genericTitles = new Set([
                "",
                meta.title,
                `${meta.title}记忆`
            ]);
            return genericTitles.has(value);
        }

        function renderActiveHeader() {
            const meta = sectionMeta(activeSection);
            const count = sectionRecords(activeSection).length;
            activeTitle.textContent = meta.title;
            activeDescription.textContent = meta.note;
            sectionNote.textContent = `当前会保存到：${meta.title}。`;
            readableBadge.textContent = `${count} 条`;
            readableBadge.className = "badge readable";
            newSection.value = activeSection;
        }

        function actionButtons(record) {
            // 烬的修改注：这里故意只保留“保存/取消”。
            // 移动、删除这种不常用操作统一放进长按菜单，避免每条记忆都变成按钮墙。
            return `
                <button class="button primary" data-action="save" type="button">保存编辑</button>
                <button class="button" data-action="cancel" type="button">取消</button>
            `;
        }

        function renderRecord(record) {
            const meta = sectionMeta(record.section);
            const title = record.title || meta.title;
            const titleIsGeneric = isGenericTitle(title, record);

            let sourceLabel = "";
            if (record.sourceChannel === "cli") sourceLabel = "Gemini 本地";
            else if (record.sourceChannel === "telegram") sourceLabel = "Telegram 桥接";
            else if (record.sourceChannel === "web_independent_memory") sourceLabel = "网页写入";
            else if (record.sourceChannel === "legacy_shared_memory") sourceLabel = "旧系统数据";
            else if (record.sourceChannel) sourceLabel = escapeHtml(record.sourceChannel);

            const sourceHtml = sourceLabel ? `<span style="margin-left: 12px; border-left: 1px solid var(--line); padding-left: 12px; color: var(--primary);">来源：${sourceLabel}</span>` : "";

            return `
                <article class="memory-card" data-id="${escapeHtml(record.id)}" data-section="${escapeHtml(record.section)}" data-metadata="${escapeHtml(encodeURIComponent(JSON.stringify(record.metadata || {})))}" ${record.virtual ? 'data-virtual="true"' : ""} title="长按这条记忆可编辑、移动或删除">
                    <div class="bulk-select-wrap">
                        <input class="bulk-checkbox" data-bulk-id="${escapeHtml(record.id)}" type="checkbox" ${record.virtual ? "disabled" : ""} aria-label="选择这条记忆">
                    </div>
                    <input class="record-title ${titleIsGeneric ? "generic-title" : ""}" value="${escapeHtml(title)}" readonly>
                    <textarea class="record-content" data-max-lines="20" readonly>${escapeHtml(record.content || "")}</textarea>
                    <div class="meta">
                        更新时间：${escapeHtml(formatTime(record.updatedAt))}${sourceHtml}
                    </div>
                    <div class="actions">
                        ${actionButtons(record)}
                    </div>
                </article>
            `;
        }

        function renderRecords() {
            const records = sectionRecords(activeSection);
            if (!records.length) {
                memoryList.innerHTML = `<div class="empty">这个区域现在是空的。你可以在上方新增一条，或者从其他区域移动过来。</div>`;
                return;
            }

            memoryList.innerHTML = records.map(renderRecord).join("");
            resizeMemoryTextareas();
        }

        function renderAll() {
            renderTabs();
            renderSectionOptions();
            renderSummary();
            renderActiveHeader();
            renderRecords();
            updateBulkToolbar();
        }

        async function requestJson(url, options = {}) {
            const response = await fetch(url, {
                ...options,
                headers: {
                    Authorization: `Bearer ${accessToken}`,
                    "Content-Type": "application/json",
                    ...(options.headers || {})
                }
            });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw new Error(payload.error || `Request failed with ${response.status}`);
            }
            return payload;
        }

        async function loadAll() {
            setFeedback("正在读取云端独立记忆...");
            bundle = await requestJson(API_URL);
            renderAll();
            setFeedback("已读取最新独立记忆。", "success");
        }

        async function createMemory() {
            const section = newSection.value || activeSection;
            const content = newContent.value.trim();
            if (!content) {
                setFeedback("先写一点记忆内容再保存。", "error");
                return;
            }

            createBtn.disabled = true;
            try {
                await requestJson(API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        section,
                        title: newTitle.value.trim(),
                        content
                    })
                });
                newTitle.value = "";
                newContent.value = "";
                activeSection = section;
                await loadAll();
                setFeedback("新记忆已经保存。", "success");
            } catch (error) {
                setFeedback(window.AppAuth ? window.AppAuth.humanizeError(error) : String(error), "error");
            } finally {
                createBtn.disabled = false;
            }
        }

        function sectionForAction(action, currentSection) {
            if (action === "move-long-term" || action === "restore-long-term") return "long_term";
            if (action === "move-large-summary" || action === "restore-large-summary") return "large_summary";
            if (action === "move-private" || action === "restore-private") return "private";
            if (action === "move-trash") return "trash";
            return currentSection;
        }

        function findActionCard() {
            return Array.from(memoryList.querySelectorAll("[data-id]"))
                .find((card) => card.dataset.id === memoryActionTargetId) || null;
        }

        function setCardReadonly(card, readonly) {
            card.querySelectorAll(".record-title, .record-content").forEach((field) => {
                field.readOnly = readonly;
            });
        }

        function beginMemoryEdit(card) {
            if (!card) return;
            const title = card.querySelector(".record-title");
            const content = card.querySelector(".record-content");
            card.dataset.originalTitle = title ? title.value : "";
            card.dataset.originalContent = content ? content.value : "";
            card.classList.add("editing");
            setCardReadonly(card, false);
            if (content) {
                content.focus();
                content.setSelectionRange(content.value.length, content.value.length);
                autoResizeTextarea(content);
            }
        }

        function cancelMemoryEdit(card) {
            if (!card) return;
            const title = card.querySelector(".record-title");
            const content = card.querySelector(".record-content");
            if (title && card.dataset.originalTitle != null) {
                title.value = card.dataset.originalTitle;
            }
            if (content && card.dataset.originalContent != null) {
                content.value = card.dataset.originalContent;
            }
            card.classList.remove("editing");
            setCardReadonly(card, true);
            delete card.dataset.originalTitle;
            delete card.dataset.originalContent;
            resizeMemoryTextareas(card);
        }

        function closeMemoryActionSheet() {
            memoryActionTargetId = "";
            memoryActionSheet.classList.add("hidden");
            memoryActionSheet.setAttribute("aria-hidden", "true");
            memorySheetActions.innerHTML = "";
        }

        function renderSheetButtons(card) {
            const section = card.dataset.section || activeSection;
            const isVirtual = card.dataset.virtual === "true";
            const buttons = [
                '<button class="button primary" data-sheet-action="edit" type="button">编辑这条记忆</button>'
            ];

            if (!isVirtual && section !== "long_term") {
                buttons.push('<button class="button" data-sheet-action="move-long-term" type="button">移动到长期记忆</button>');
            }
            if (!isVirtual && section !== "private") {
                buttons.push('<button class="button" data-sheet-action="move-private" type="button">移动到私密记忆</button>');
            }
            if (!isVirtual && section === "trash") {
                buttons.push('<button class="button danger" data-sheet-action="delete" type="button">永久删除</button>');
            } else if (!isVirtual) {
                buttons.push('<button class="button danger" data-sheet-action="move-trash" type="button">移到垃圾箱</button>');
            }

            return buttons.join("");
        }

        function openMemoryActionSheet(card) {
            if (!card) return;
            memoryActionTargetId = card.dataset.id || "";
            memorySheetActions.innerHTML = renderSheetButtons(card);
            memoryActionSheet.classList.remove("hidden");
            memoryActionSheet.setAttribute("aria-hidden", "false");
        }

        function clearMemoryLongPress() {
            if (memoryLongPressTimer) {
                clearTimeout(memoryLongPressTimer);
            }
            memoryLongPressTimer = null;
            memoryPointerCard = null;
        }

        async function saveCard(card, action, options = {}) {
            const shouldReload = options.reload !== false;
            const shouldConfirmDelete = options.confirmDelete !== false;
            const id = card.dataset.id;
            const currentSection = card.dataset.section || activeSection;
            const section = sectionForAction(action, currentSection);
            const title = card.querySelector(".record-title").value.trim();
            const content = card.querySelector(".record-content").value.trim();
            const metadata = card.dataset.metadata
                ? JSON.parse(decodeURIComponent(card.dataset.metadata))
                : {};

            if (action === "delete") {
                if (shouldConfirmDelete && !confirm("确定永久删除这条记忆吗？这个操作不能撤回。")) {
                    return false;
                }
                await requestJson(`${API_URL}?id=${encodeURIComponent(id)}`, {
                    method: "DELETE"
                });
                if (shouldReload) {
                    await loadAll();
                    setFeedback("已永久删除。", "success");
                }
                return true;
            }

            await requestJson(API_URL, {
                method: "PATCH",
                body: JSON.stringify({
                    id,
                    section,
                    title,
                    content,
                    metadata
                })
            });
            activeSection = section;
            if (shouldReload) {
                await loadAll();
                setFeedback("记忆已更新。", "success");
            }
            return true;
        }

        function setBulkButtonsDisabled(disabled) {
            [bulkModeBtn, bulkSelectAllBtn, bulkMoveBtn, bulkDeleteBtn, bulkCancelBtn].forEach((button) => {
                button.disabled = disabled;
            });
            bulkTarget.disabled = disabled;
        }

        function toggleBulkMode(open) {
            isBulkMode = open && bulkRecords().length > 0;
            memoryList.querySelectorAll(".bulk-checkbox").forEach((checkbox) => {
                checkbox.checked = false;
            });
            updateBulkToolbar();
        }

        async function runBulkAction(action) {
            const cards = selectedBulkCards();
            if (!cards.length) {
                setFeedback("先选择要整理的记忆。", "error");
                return;
            }

            const target = action === "move" ? bulkTarget.value : "";
            const moveAction = target
                ? `move-${target.replace(/_/g, "-")}`
                : "";
            const finalAction = action === "delete"
                ? activeSection === "trash" ? "delete" : "move-trash"
                : moveAction;
            const targetLabel = target ? sectionMeta(target).title : "";
            const actionLabel = action === "delete"
                ? activeSection === "trash" ? "永久删除" : "移到垃圾箱"
                : `移动到${targetLabel}`;

            if (!finalAction) {
                setFeedback("先选择要移动到的区域。", "error");
                return;
            }

            if (!confirm(`确定要把 ${cards.length} 条记忆${actionLabel}吗？`)) {
                return;
            }

            setBulkButtonsDisabled(true);
            try {
                let updated = 0;
                for (const card of cards) {
                    const ok = await saveCard(card, finalAction, {
                        reload: false,
                        confirmDelete: false
                    });
                    if (ok) {
                        updated += 1;
                    }
                }
                isBulkMode = false;
                await loadAll();
                setFeedback(`已完成批量操作：${updated} 条记忆${actionLabel}。`, "success");
            } catch (error) {
                setFeedback(window.AppAuth ? window.AppAuth.humanizeError(error) : String(error), "error");
            } finally {
                setBulkButtonsDisabled(false);
                updateBulkToolbar();
            }
        }

        tabs.addEventListener("click", (event) => {
            const tab = event.target.closest("[data-section]");
            if (!tab) return;
            isBulkMode = false;
            activeSection = tab.dataset.section;
            renderAll();
        });

        newSection.addEventListener("change", () => {
            isBulkMode = false;
            activeSection = newSection.value;
            renderAll();
        });

        createToggleBtn.addEventListener("click", () => {
            setCreateOpen(!isCreateOpen);
        });

        createBtn.addEventListener("click", createMemory);
        reloadBtn.addEventListener("click", () => {
            loadAll().catch((error) => {
                setFeedback(window.AppAuth ? window.AppAuth.humanizeError(error) : String(error), "error");
            });
        });

        bulkModeBtn.addEventListener("click", () => {
            toggleBulkMode(true);
        });

        bulkCancelBtn.addEventListener("click", () => {
            toggleBulkMode(false);
        });

        bulkSelectAllBtn.addEventListener("click", () => {
            const checkboxes = Array.from(memoryList.querySelectorAll(".bulk-checkbox:not(:disabled)"));
            const shouldSelectAll = selectedBulkCards().length !== checkboxes.length;
            checkboxes.forEach((checkbox) => {
                checkbox.checked = shouldSelectAll;
            });
            updateBulkToolbar();
        });

        bulkMoveBtn.addEventListener("click", () => {
            runBulkAction("move");
        });

        bulkDeleteBtn.addEventListener("click", () => {
            runBulkAction("delete");
        });

        memoryList.addEventListener("click", async (event) => {
            const button = event.target.closest("button[data-action]");
            if (!button) return;
            const card = button.closest("[data-id]");
            if (!card) return;

            if (button.dataset.action === "cancel") {
                cancelMemoryEdit(card);
                return;
            }

            button.disabled = true;
            try {
                await saveCard(card, button.dataset.action);
            } catch (error) {
                setFeedback(window.AppAuth ? window.AppAuth.humanizeError(error) : String(error), "error");
            } finally {
                button.disabled = false;
            }
        });

        memoryList.addEventListener("change", (event) => {
            if (event.target.matches(".bulk-checkbox")) {
                updateBulkToolbar();
            }
        });

        memoryList.addEventListener("input", (event) => {
            if (event.target.matches(".record-content")) {
                autoResizeTextarea(event.target);
            }
        });

        memoryList.addEventListener("pointerdown", (event) => {
            if (isBulkMode || event.target.closest(".bulk-select-wrap")) return;
            const card = event.target.closest("[data-id]");
            if (!card || card.classList.contains("editing")) return;
            clearMemoryLongPress();
            memoryPointerCard = card;
            memoryLongPressTimer = window.setTimeout(() => {
                openMemoryActionSheet(memoryPointerCard);
                clearMemoryLongPress();
            }, 560);
        });

        memoryList.addEventListener("pointerup", clearMemoryLongPress);
        memoryList.addEventListener("pointerleave", clearMemoryLongPress);
        memoryList.addEventListener("pointercancel", clearMemoryLongPress);
        memoryList.addEventListener("contextmenu", (event) => {
            if (isBulkMode) return;
            const card = event.target.closest("[data-id]");
            if (!card) return;
            event.preventDefault();
            openMemoryActionSheet(card);
        });

        memoryActionSheet.addEventListener("click", async (event) => {
            if (event.target === memoryActionSheet) {
                closeMemoryActionSheet();
                return;
            }

            const button = event.target.closest("[data-sheet-action]");
            if (!button) return;
            const card = findActionCard();
            const action = button.dataset.sheetAction;
            closeMemoryActionSheet();

            if (!card) return;
            if (action === "edit") {
                beginMemoryEdit(card);
                return;
            }

            button.disabled = true;
            try {
                await saveCard(card, action);
            } catch (error) {
                setFeedback(window.AppAuth ? window.AppAuth.humanizeError(error) : String(error), "error");
            } finally {
                button.disabled = false;
            }
        });

        async function bootstrap() {
            if (window.location.protocol === "file:") {
                userEmail.textContent = "本地 file:// 预览不可用";
                memoryCount.textContent = "请打开线上页面";
                memoryList.innerHTML = `<div class="empty">这个页面依赖登录态和网站 API，不能直接用 file:// 打开。请使用：${LIVE_URL}</div>`;
                return;
            }

            if (!window.AppAuth) {
                throw new Error("Supabase auth script failed to load.");
            }

            const authState = await window.AppAuth.requireUser();
            if (authState.redirected) {
                return;
            }

            accessToken = authState.session ? authState.session.access_token : "";
            userEmail.textContent =
                authState.user && authState.user.email ? authState.user.email : "已登录";
            await loadAll();
        }

        renderTabs();
        renderSectionOptions();
        bootstrap().catch((error) => {
            setFeedback(window.AppAuth ? window.AppAuth.humanizeError(error) : String(error), "error");
        });
    </script>
</body>
</html>
