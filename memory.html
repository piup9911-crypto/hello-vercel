<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共享记忆控制台</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="shared/supabase-auth.js"></script>
    <style>
        :root {
            --bg: #f6f3ff;
            --panel: rgba(255, 255, 255, 0.92);
            --panel-strong: rgba(255, 255, 255, 0.98);
            --text: #2f2940;
            --muted: #746a88;
            --line: #e8def6;
            --primary: #7c5cff;
            --primary-soft: rgba(124, 92, 255, 0.12);
            --success: #0f9d58;
            --danger: #dc2626;
            --shadow: 0 24px 60px rgba(73, 48, 128, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 24px;
            color: var(--text);
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), transparent 28%),
                radial-gradient(circle at bottom right, rgba(196, 181, 253, 0.28), transparent 24%),
                linear-gradient(160deg, #fcfbff 0%, #f6f3ff 48%, #f8fcff 100%);
        }

        .shell {
            width: min(100%, 1100px);
            margin: 0 auto;
            display: grid;
            gap: 20px;
        }

        .panel {
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.72);
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            padding: 28px;
        }

        .topbar,
        .section-header,
        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .eyebrow,
        .chip,
        .tag,
        .status-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: fit-content;
            border-radius: 999px;
            font-weight: 600;
        }

        .eyebrow {
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid var(--line);
            color: var(--muted);
            font-size: 13px;
        }

        .chip,
        .tag {
            padding: 6px 10px;
            background: rgba(47, 41, 64, 0.06);
            color: var(--muted);
            font-size: 12px;
        }

        .status-chip {
            padding: 7px 12px;
            background: var(--primary-soft);
            color: var(--primary);
            font-size: 12px;
        }

        h1 {
            margin: 18px 0 10px;
            font-size: clamp(30px, 5vw, 48px);
            line-height: 1.08;
        }

        h2 {
            margin: 0;
            font-size: 22px;
            line-height: 1.2;
        }

        .lead,
        .section-note,
        .tiny {
            color: var(--muted);
            line-height: 1.75;
        }

        .lead {
            max-width: 64ch;
            font-size: 15px;
        }

        .section-note,
        .tiny {
            font-size: 14px;
        }

        .meta-grid,
        .memory-grid {
            display: grid;
            gap: 12px;
        }

        .meta-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
            margin-top: 22px;
        }

        .memory-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .meta-card,
        .memory-card {
            border-radius: 22px;
            padding: 18px;
            background: var(--panel-strong);
            border: 1px solid var(--line);
        }

        .meta-label {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .meta-value {
            margin-top: 8px;
            line-height: 1.7;
            word-break: break-word;
        }

        .cards {
            display: grid;
            gap: 14px;
        }

        .memory-card {
            display: grid;
            gap: 12px;
        }

        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        textarea,
        input,
        select,
        button {
            font: inherit;
        }

        textarea,
        input,
        select {
            width: 100%;
            border-radius: 18px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.95);
            color: var(--text);
            padding: 14px 16px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        textarea {
            min-height: 220px;
            resize: vertical;
            line-height: 1.8;
        }

        textarea:focus,
        input:focus,
        select:focus {
            border-color: rgba(124, 92, 255, 0.44);
            box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.08);
        }

        .ghost-btn,
        .primary-btn,
        .success-btn,
        .danger-btn {
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: 18px;
            padding: 12px 16px;
            text-decoration: none;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .ghost-btn:hover,
        .primary-btn:hover,
        .success-btn:hover,
        .danger-btn:hover {
            transform: translateY(-1px);
        }

        .ghost-btn {
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid var(--line);
            color: var(--text);
        }

        .primary-btn {
            color: white;
            background: linear-gradient(135deg, var(--primary) 0%, #af8cff 100%);
            box-shadow: 0 14px 30px rgba(124, 92, 255, 0.24);
            font-weight: 700;
        }

        .success-btn {
            background: rgba(15, 157, 88, 0.12);
            color: var(--success);
            border: 1px solid rgba(15, 157, 88, 0.18);
        }

        .danger-btn {
            background: rgba(220, 38, 38, 0.1);
            color: var(--danger);
            border: 1px solid rgba(220, 38, 38, 0.16);
        }

        .feedback {
            min-height: 24px;
            color: var(--muted);
            line-height: 1.7;
        }

        .feedback.error {
            color: var(--danger);
        }

        .feedback.success {
            color: var(--primary);
        }

        .empty {
            border-radius: 20px;
            border: 1px dashed var(--line);
            padding: 18px;
            color: var(--muted);
            line-height: 1.8;
        }

        @media (max-width: 820px) {
            body {
                padding: 16px;
            }

            .panel {
                padding: 22px;
            }

            .meta-grid,
            .memory-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <section class="panel">
            <div class="topbar">
                <div class="eyebrow">共享记忆控制台</div>
                <a class="ghost-btn" href="index.html">返回首页</a>
            </div>
            <h1>保留少量长期记忆，再配一条当前摘要。</h1>
            <div class="lead">
                这版会更接近 ChatGPT / RikkaHub 风格。长期记忆只保留稳定偏好、人物信息和关系信息；当前正在发生的事只保留一条滚动摘要，不再把每段聊天都拆成很多词条。
            </div>
            <div class="meta-grid">
                <div class="meta-card">
                    <div class="meta-label">当前账号</div>
                    <div class="meta-value" id="user-email">正在识别…</div>
                </div>
                <div class="meta-card">
                    <div class="meta-label">最近云端更新时间</div>
                    <div class="meta-value" id="updated-at">尚未读取</div>
                </div>
                <div class="meta-card">
                    <div class="meta-label">当前状态</div>
                    <div class="meta-value" id="memory-count">正在加载…</div>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="section-header">
                <div>
                    <h2>手动共享记忆</h2>
                    <div class="section-note">这里适合写你明确想让 CLI 和 Telegram 长期都记住的核心背景。</div>
                </div>
                <button class="primary-btn" id="save-btn" type="button">保存手动共享记忆</button>
            </div>
            <textarea id="manual-memory" placeholder="例如：我们已经一起折腾过 Telegram bridge；Telegram 上更像陪伴聊天，CLI 上更像一起做事。"></textarea>
            <div class="feedback" id="manual-feedback"></div>
        </section>

        <section class="panel">
            <div class="section-header">
                <div>
                    <h2>待确认记忆</h2>
                    <div class="section-note">这里只保留真正值得留下的长期记忆候选，或一条新的当前摘要候选。</div>
                </div>
                <button class="ghost-btn" id="reload-btn" type="button">重新读取</button>
            </div>
            <div class="cards" id="pending-list"></div>
        </section>

        <section class="panel">
            <div class="section-header">
                <div>
                    <h2>已确认记忆</h2>
                    <div class="section-note">同步器会把这些内容打包下发给 CLI 和 Telegram。</div>
                </div>
            </div>
            <div class="cards" id="approved-list"></div>
        </section>
    </div>

    <script>
        const userEmail = document.getElementById("user-email");
        const updatedAt = document.getElementById("updated-at");
        const memoryCount = document.getElementById("memory-count");
        const manualMemory = document.getElementById("manual-memory");
        const saveBtn = document.getElementById("save-btn");
        const reloadBtn = document.getElementById("reload-btn");
        const manualFeedback = document.getElementById("manual-feedback");
        const pendingList = document.getElementById("pending-list");
        const approvedList = document.getElementById("approved-list");

        let accessToken = "";
        let bundle = {
            content: "",
            approvedEntries: [],
            pendingEntries: []
        };

        function setFeedback(node, message, type) {
            node.textContent = message || "";
            node.className = `feedback ${type || ""}`.trim();
        }

        function formatTime(value) {
            if (!value) return "尚未同步";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return value;
            return new Intl.DateTimeFormat("zh-CN", {
                dateStyle: "medium",
                timeStyle: "short"
            }).format(date);
        }

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function readEntryMeta(entry) {
            return entry && entry.metadata && typeof entry.metadata === "object"
                ? entry.metadata
                : {};
        }

        function splitHighlights(raw) {
            return String(raw || "")
                .split(/\s*\|\s*/g)
                .map((item) => item.trim())
                .filter(Boolean)
                .slice(0, 3);
        }

        function getHighlights(entry) {
            const meta = readEntryMeta(entry);
            if (Array.isArray(meta.keyPoints) && meta.keyPoints.length > 0) {
                return meta.keyPoints
                    .map((item) => String(item || "").trim())
                    .filter(Boolean)
                    .slice(0, 3);
            }
            return splitHighlights(entry.detail || "");
        }

        function getMemoryKind(entry) {
            const meta = readEntryMeta(entry);
            if (
                meta.memoryKind === "current_summary" ||
                meta.memoryType === "current_summary" ||
                meta.timeScope === "current" ||
                meta.eventStatus === "ongoing"
            ) {
                return "current_summary";
            }
            return "long_term";
        }

        function getMemoryType(entry) {
            if (getMemoryKind(entry) === "current_summary") {
                return "current_summary";
            }
            const meta = readEntryMeta(entry);
            const raw = String(meta.memoryType || meta.category || "").trim();
            if (["identity", "preference", "relationship"].includes(raw)) {
                return raw;
            }
            return "preference";
        }

        function memoryTypeLabel(type) {
            const labels = {
                identity: "Identity",
                preference: "Preference",
                relationship: "Relationship",
                current_summary: "Current Summary"
            };
            return labels[type] || "Long-Term Memory";
        }

        function buildMetaLine(entry) {
            const segments = [
                memoryTypeLabel(getMemoryType(entry)),
                `Source: ${entry.source_channel || "unknown"}`,
                `Time: ${formatTime(entry.updated_at || readEntryMeta(entry).updatedAt)}`
            ];
            if (entry.confidence != null) {
                segments.push(`Confidence: ${Number(entry.confidence).toFixed(2)}`);
            }
            return segments.join(" | ");
        }

        function renderCard(entry, badge) {
            const highlights = getHighlights(entry);
            return `
                <article class="memory-card">
                    <div class="row">
                        <div class="status-chip">${escapeHtml(badge)}</div>
                        <div class="tiny">${escapeHtml(entry.status || "approved")}</div>
                    </div>
                    <div><strong>${escapeHtml(entry.summary || "")}</strong></div>
                    ${highlights.length ? `
                        <div class="tags">
                            ${highlights.map((item) => `<span class="tag">${escapeHtml(item)}</span>`).join("")}
                        </div>
                    ` : ""}
                    <div class="tiny">${escapeHtml(buildMetaLine(entry))}</div>
                </article>
            `;
        }

        function renderPendingCard(entry) {
            const memoryKind = getMemoryKind(entry);
            const memoryType = getMemoryType(entry);
            const highlights = getHighlights(entry).join(" | ");
            const kindBadge = memoryKind === "current_summary" ? "Current Summary Candidate" : "Long-Term Candidate";
            const typeLabel = memoryKind === "current_summary" ? "Current Summary" : "Memory Type";

            return `
                <article
                    class="memory-card"
                    data-entry-id="${escapeHtml(entry.id)}"
                    data-entry-kind="${escapeHtml(memoryKind)}"
                    data-entry-meta="${escapeHtml(encodeURIComponent(JSON.stringify(readEntryMeta(entry))))}"
                >
                    <div class="row">
                        <div class="status-chip">${escapeHtml(kindBadge)}</div>
                        <div class="tiny">${escapeHtml(buildMetaLine(entry))}</div>
                    </div>
                    <div class="memory-grid">
                        ${memoryKind === "current_summary" ? `
                            <div>
                                <div class="tiny">${escapeHtml(typeLabel)}</div>
                                <input value="Current Summary" disabled>
                            </div>
                        ` : `
                            <div>
                                <div class="tiny">${escapeHtml(typeLabel)}</div>
                                <select class="memory-type-input">
                                    ${["identity", "preference", "relationship"].map((type) => `
                                        <option value="${escapeHtml(type)}" ${memoryType === type ? "selected" : ""}>${escapeHtml(memoryTypeLabel(type))}</option>
                                    `).join("")}
                                </select>
                            </div>
                        `}
                        <div>
                            <div class="tiny">Memory</div>
                            <input class="summary-input" value="${escapeHtml(entry.summary || "")}">
                        </div>
                    </div>
                    <div>
                        <div class="tiny">Highlights</div>
                        <input class="detail-input" value="${escapeHtml(highlights)}" placeholder="Optional. Use | to separate a few key points.">
                    </div>
                    <div class="row">
                        <div class="tiny">Keep it lightweight: one short memory plus a few key points is enough.</div>
                        <div class="row">
                            <button class="success-btn" data-action="approve" type="button">Approve</button>
                            <button class="primary-btn" data-action="edit" type="button">Approve After Edit</button>
                            <button class="danger-btn" data-action="reject" type="button">Reject</button>
                        </div>
                    </div>
                </article>
            `;
        }

        function getCurrentSummaryEntry(entries) {
            return (entries || []).find((entry) => getMemoryKind(entry) === "current_summary") || null;
        }

        function getLongTermEntries(entries) {
            return (entries || []).filter((entry) => getMemoryKind(entry) !== "current_summary");
        }

        function updateSummary() {
            const currentSummary = getCurrentSummaryEntry(bundle.approvedEntries);
            const longTermCount = getLongTermEntries(bundle.approvedEntries).length;
            memoryCount.textContent = `Pending ${bundle.pendingEntries.length} | Long-term ${longTermCount} | Current summary ${currentSummary ? "1" : "0"}`;
        }

        function renderApproved() {
            const currentSummary = getCurrentSummaryEntry(bundle.approvedEntries);
            const longTermEntries = getLongTermEntries(bundle.approvedEntries);

            if (!currentSummary && longTermEntries.length === 0) {
                approvedList.innerHTML = '<div class="empty">No approved memory yet. This page keeps only a small long-term memory set and one rolling current summary.</div>';
                return;
            }

            const sections = [];

            if (currentSummary) {
                sections.push(`
                    <div class="tiny">Current Summary</div>
                    <div class="cards">${renderCard(currentSummary, "Current Summary")}</div>
                `);
            }

            if (longTermEntries.length > 0) {
                sections.push(`
                    <div class="tiny">Long-Term Memory</div>
                    <div class="cards">${longTermEntries.map((entry) => renderCard(entry, memoryTypeLabel(getMemoryType(entry)))).join("")}</div>
                `);
            }

            approvedList.innerHTML = sections.join("");
        }

        function renderPending() {
            if (!bundle.pendingEntries.length) {
                pendingList.innerHTML = '<div class="empty">No pending candidates right now. The system is now more conservative and only suggests durable long-term memory or one current summary.</div>';
                return;
            }

            const currentSummary = getCurrentSummaryEntry(bundle.pendingEntries);
            const longTermEntries = getLongTermEntries(bundle.pendingEntries);
            const sections = [];

            if (currentSummary) {
                sections.push(`
                    <div class="tiny">Current Summary Candidate</div>
                    <div class="cards">${renderPendingCard(currentSummary)}</div>
                `);
            }

            if (longTermEntries.length > 0) {
                sections.push(`
                    <div class="tiny">Long-Term Memory Candidates</div>
                    <div class="cards">${longTermEntries.map(renderPendingCard).join("")}</div>
                `);
            }

            pendingList.innerHTML = sections.join("");
        }

        async function fetchBundle() {
            const response = await fetch("/api/shared-memory", {
                method: "GET",
                headers: {
                    Authorization: `Bearer ${accessToken}`,
                    Accept: "application/json"
                },
                cache: "no-store"
            });
            const payload = await response.json();
            if (!response.ok) {
                throw new Error(payload.error || "Failed to load shared memory.");
            }
            return payload;
        }

        async function loadAll() {
            setFeedback(manualFeedback, "", "");
            reloadBtn.disabled = true;

            try {
                bundle = await fetchBundle();
                manualMemory.value = bundle.content || "";
                updatedAt.textContent = formatTime(bundle.updatedAt);
                updateSummary();
                renderPending();
                renderApproved();
                setFeedback(manualFeedback, "Loaded the latest shared memory and review candidates.", "success");
            } catch (error) {
                setFeedback(
                    manualFeedback,
                    window.AppAuth ? window.AppAuth.humanizeError(error) : String(error),
                    "error"
                );
            } finally {
                reloadBtn.disabled = false;
            }
        }

        async function saveManualMemory() {
            setFeedback(manualFeedback, "", "");
            saveBtn.disabled = true;
            saveBtn.textContent = "Saving...";

            try {
                const response = await fetch("/api/shared-memory", {
                    method: "PUT",
                    headers: {
                        Authorization: `Bearer ${accessToken}`,
                        Accept: "application/json",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        content: manualMemory.value
                    })
                });
                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.error || "Failed to save shared memory.");
                }
                updatedAt.textContent = formatTime(payload.updatedAt);
                setFeedback(manualFeedback, "Manual shared memory has been saved to the cloud.", "success");
            } catch (error) {
                setFeedback(
                    manualFeedback,
                    window.AppAuth ? window.AppAuth.humanizeError(error) : String(error),
                    "error"
                );
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = "Save Manual Shared Memory";
            }
        }

        async function patchEntry(id, payload) {
            const response = await fetch("/api/memory-entries", {
                method: "PATCH",
                headers: {
                    Authorization: `Bearer ${accessToken}`,
                    Accept: "application/json",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    id,
                    ...payload
                })
            });

            const result = await response.json();
            if (!response.ok) {
                throw new Error(result.error || "Failed to update memory.");
            }

            return result.entry;
        }

        pendingList.addEventListener("click", async (event) => {
            const button = event.target.closest("button[data-action]");
            if (!button) return;

            const card = button.closest("[data-entry-id]");
            if (!card) return;

            const id = card.dataset.entryId;
            const metadata = card.dataset.entryMeta
                ? JSON.parse(decodeURIComponent(card.dataset.entryMeta))
                : {};
            const memoryKind = card.dataset.entryKind === "current_summary" ? "current_summary" : "long_term";
            const typeInput = card.querySelector(".memory-type-input");
            const memoryType = memoryKind === "current_summary"
                ? "current_summary"
                : (typeInput ? typeInput.value.trim() : "preference");
            const summary = card.querySelector(".summary-input").value.trim();
            const detail = card.querySelector(".detail-input").value.trim();
            const keyPoints = splitHighlights(detail);
            const action = button.dataset.action;

            button.disabled = true;

            try {
                const nextMetadata = {
                    ...metadata,
                    memoryKind,
                    memoryType,
                    category: memoryKind === "current_summary" ? "current_summary" : memoryType,
                    keyPoints,
                    timeScope: memoryKind === "current_summary" ? "current" : "stable",
                    eventStatus: memoryKind === "current_summary" ? "ongoing" : "none"
                };

                await patchEntry(id, {
                    summary,
                    detail,
                    reason: "",
                    metadata: nextMetadata,
                    status:
                        action === "approve"
                            ? "approved"
                            : action === "edit"
                                ? "edited"
                                : "rejected"
                });

                await loadAll();
            } catch (error) {
                setFeedback(
                    manualFeedback,
                    window.AppAuth ? window.AppAuth.humanizeError(error) : String(error),
                    "error"
                );
            } finally {
                button.disabled = false;
            }
        });

        async function bootstrap() {
            if (!window.AppAuth) {
                throw new Error("Supabase auth script failed to load.");
            }

            const authState = await window.AppAuth.requireUser();
            if (authState.redirected) {
                return;
            }

            accessToken = authState.session ? authState.session.access_token : "";
            userEmail.textContent =
                authState.user && authState.user.email ? authState.user.email : "Signed in";
            await loadAll();
        }

        saveBtn.addEventListener("click", saveManualMemory);
        reloadBtn.addEventListener("click", loadAll);

        bootstrap().catch((error) => {
            setFeedback(
                manualFeedback,
                window.AppAuth ? window.AppAuth.humanizeError(error) : String(error),
                "error"
            );
        });
    </script>
</body>
</html>
