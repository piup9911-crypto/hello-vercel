<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gem 状态舱</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="shared/supabase-auth.js"></script>
  <style>
    :root {
      --bg: #f4f1e8;
      --ink: #27231c;
      --muted: #756d5d;
      --line: rgba(78, 69, 51, 0.14);
      --card: rgba(255, 252, 242, 0.86);
      --card-strong: rgba(255, 253, 247, 0.94);
      --good: #2f8f62;
      --warn: #b7791f;
      --bad: #b23b3b;
      --shadow: 0 24px 70px rgba(70, 55, 25, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(circle at 12% 12%, rgba(255, 255, 255, 0.96), transparent 28%),
        radial-gradient(circle at 88% 8%, rgba(172, 207, 187, 0.38), transparent 26%),
        radial-gradient(circle at 72% 82%, rgba(232, 190, 124, 0.32), transparent 24%),
        linear-gradient(145deg, #f9f4e5 0%, #edf3e8 52%, #f7efe2 100%);
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 30px 0 42px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 34px;
      padding: clamp(24px, 4vw, 42px);
      background: linear-gradient(135deg, rgba(255, 253, 246, 0.94), rgba(237, 247, 232, 0.82));
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 240px;
      height: 240px;
      right: -70px;
      top: -70px;
      border-radius: 48% 52% 44% 56%;
      background: linear-gradient(135deg, rgba(81, 142, 112, 0.18), rgba(223, 174, 94, 0.18));
      transform: rotate(12deg);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 18px;
    }

    .topline {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .eyebrow {
      width: fit-content;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 13px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .lead {
      max-width: 58ch;
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button,
    .link-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 11px 16px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.74);
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover,
    .link-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(67, 54, 31, 0.1);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .card {
      min-height: 170px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 26px;
      padding: 20px;
      background: var(--card);
      box-shadow: 0 18px 44px rgba(70, 55, 25, 0.08);
    }

    .card.wide {
      grid-column: span 2;
    }

    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
      font-weight: 800;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warn);
      box-shadow: 0 0 0 4px rgba(183, 121, 31, 0.12);
    }

    .pill.good .dot {
      background: var(--good);
      box-shadow: 0 0 0 4px rgba(47, 143, 98, 0.13);
    }

    .pill.bad .dot {
      background: var(--bad);
      box-shadow: 0 0 0 4px rgba(178, 59, 59, 0.13);
    }

    .value {
      color: var(--ink);
      font-size: 15px;
      line-height: 1.7;
      word-break: break-word;
    }

    .muted {
      color: var(--muted);
    }

    .mono {
      font-family: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
      font-size: 13px;
    }

    .log {
      max-height: 220px;
      overflow: auto;
      border-radius: 18px;
      padding: 14px;
      background: rgba(37, 33, 25, 0.06);
      white-space: pre-wrap;
    }

    .footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .card.wide {
        grid-column: auto;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-content">
        <div class="topline">
          <div class="eyebrow">Gem status cockpit</div>
          <div class="actions">
            <a class="link-btn" href="index.html">返回首页</a>
            <button id="refresh-btn" type="button">刷新状态</button>
          </div>
        </div>
        <div>
          <h1>Gem 状态舱</h1>
          <p class="lead">这里显示本机桥接上报到云端的状态。网站不直接碰你的电脑，只读取最近一次同步结果，所以它适合在手机上快速判断：桥接有没有开、小手机地址是哪一个、最近有没有请求打进来。</p>
        </div>
      </div>
    </section>

    <section class="grid" aria-live="polite">
      <article class="card">
        <div class="card-title">
          <span>OpenAI Bridge</span>
          <span class="pill" id="openai-pill"><span class="dot"></span><span>未知</span></span>
        </div>
        <div class="value" id="openai-value">等待本机上报。</div>
      </article>

      <article class="card">
        <div class="card-title">
          <span>公网入口</span>
          <span class="pill" id="public-pill"><span class="dot"></span><span>未知</span></span>
        </div>
        <div class="value mono" id="public-url">暂无</div>
        <div class="actions" style="margin-top: 14px;">
          <button id="copy-public-url" type="button">复制地址</button>
        </div>
      </article>

      <article class="card">
        <div class="card-title">
          <span>Telegram Bridge</span>
          <span class="pill" id="telegram-pill"><span class="dot"></span><span>未知</span></span>
        </div>
        <div class="value" id="telegram-value">等待本机上报。</div>
      </article>

      <article class="card wide">
        <div class="card-title">
          <span>最近请求</span>
          <span class="pill" id="fresh-pill"><span class="dot"></span><span>未同步</span></span>
        </div>
        <div class="value log mono" id="last-events">暂无日志。</div>
      </article>

      <article class="card">
        <div class="card-title">
          <span>记忆同步</span>
          <span class="pill" id="memory-pill"><span class="dot"></span><span>未知</span></span>
        </div>
        <div class="value" id="memory-value">等待本机上报。</div>
      </article>
    </section>

    <div class="footer">
      <span id="updated-at">更新时间：暂无</span>
      <span id="reporter">上报端：暂无</span>
    </div>
  </main>

  <script>
    const API_URL = "/api/gem-status";
    let accessToken = "";
    let latestPublicUrl = "";

    const el = {
      openaiPill: document.getElementById("openai-pill"),
      openaiValue: document.getElementById("openai-value"),
      publicPill: document.getElementById("public-pill"),
      publicUrl: document.getElementById("public-url"),
      telegramPill: document.getElementById("telegram-pill"),
      telegramValue: document.getElementById("telegram-value"),
      freshPill: document.getElementById("fresh-pill"),
      lastEvents: document.getElementById("last-events"),
      memoryPill: document.getElementById("memory-pill"),
      memoryValue: document.getElementById("memory-value"),
      updatedAt: document.getElementById("updated-at"),
      reporter: document.getElementById("reporter"),
      refreshBtn: document.getElementById("refresh-btn"),
      copyBtn: document.getElementById("copy-public-url")
    };

    function setPill(node, state, label) {
      node.classList.remove("good", "bad");
      if (state === "good") node.classList.add("good");
      if (state === "bad") node.classList.add("bad");
      node.querySelector("span:last-child").textContent = label;
    }

    function formatTime(value) {
      if (!value) return "暂无";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString("zh-CN", {
        hour12: false
      });
    }

    function minutesSince(value) {
      if (!value) return Infinity;
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return Infinity;
      return Math.round((Date.now() - date.getTime()) / 60000);
    }

    function renderStatus(status) {
      const services = status.services || {};
      const links = status.links || {};
      const openai = services.openaiBridge || {};
      const telegram = services.telegramBridge || {};
      const memory = services.memorySync || {};
      const publicTunnel = services.publicTunnel || {};
      const age = minutesSince(status.updatedAt);

      setPill(el.freshPill, age <= 2 ? "good" : age <= 10 ? "warn" : "bad", age === Infinity ? "未同步" : `${age} 分钟前`);
      setPill(el.openaiPill, openai.online ? "good" : "bad", openai.online ? "在线" : "离线");
      setPill(el.publicPill, links.publicUrl ? "good" : "bad", links.publicUrl ? "可用" : "暂无");
      setPill(el.telegramPill, telegram.online ? "good" : telegram.online === false ? "bad" : "warn", telegram.online ? "在线" : telegram.online === false ? "离线" : "未知");
      setPill(el.memoryPill, memory.configured ? "good" : "warn", memory.configured ? "已配置" : "未配置");

      latestPublicUrl = links.publicUrl || "";
      el.publicUrl.textContent = latestPublicUrl || "暂无公网地址。";
      el.openaiValue.innerHTML = [
        `端口：${openai.port || 4141}`,
        `PID：${openai.pid || "未知"}`,
        `模型：${openai.model || "未知"}`
      ].join("<br>");
      el.telegramValue.innerHTML = [
        `PID：${telegram.pid || "未知"}`,
        `锁文件：${telegram.lockFile ? "存在" : "未发现"}`,
        telegram.lastLine ? `最近日志：${telegram.lastLine}` : "最近日志：暂无"
      ].join("<br>");
      el.memoryValue.innerHTML = [
        `云端接口：${memory.url || "未知"}`,
        `Token：${memory.hasToken ? "已配置" : "未配置"}`
      ].join("<br>");

      const eventLines = [];
      if (openai.lastLine) eventLines.push(`[OpenAI] ${openai.lastLine}`);
      if (publicTunnel.lastLine) eventLines.push(`[Tunnel] ${publicTunnel.lastLine}`);
      if (telegram.lastLine) eventLines.push(`[Telegram] ${telegram.lastLine}`);
      el.lastEvents.textContent = eventLines.length ? eventLines.join("\n\n") : "暂无日志。";

      el.updatedAt.textContent = `更新时间：${formatTime(status.updatedAt)}`;
      el.reporter.textContent = `上报端：${status.reporter && status.reporter.hostname ? status.reporter.hostname : "暂无"}`;
    }

    async function requestStatus() {
      const response = await fetch(API_URL, {
        headers: {
          Authorization: `Bearer ${accessToken}`,
          Accept: "application/json"
        },
        cache: "no-store"
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.error || `状态读取失败：${response.status}`);
      }
      renderStatus(payload);
    }

    async function init() {
      const auth = await window.AppAuth.requireUser();
      if (auth.redirected) return;
      accessToken = auth.session.access_token;
      await requestStatus();
    }

    el.refreshBtn.addEventListener("click", () => {
      requestStatus().catch((error) => {
        el.lastEvents.textContent = error && error.message ? error.message : String(error);
      });
    });

    el.copyBtn.addEventListener("click", async () => {
      if (!latestPublicUrl) return;
      await navigator.clipboard.writeText(latestPublicUrl);
      el.copyBtn.textContent = "已复制";
      setTimeout(() => {
        el.copyBtn.textContent = "复制地址";
      }, 1200);
    });

    init().catch((error) => {
      el.lastEvents.textContent = error && error.message ? error.message : String(error);
      setPill(el.freshPill, "bad", "读取失败");
    });
  </script>
</body>
</html>
