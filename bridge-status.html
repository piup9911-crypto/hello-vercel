<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桥接状态总舱</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="shared/supabase-auth.js"></script>
  <style>
    :root {
      --bg: #f4f1e8;
      --ink: #27231c;
      --muted: #756d5d;
      --line: rgba(78, 69, 51, 0.14);
      --card: rgba(255, 252, 242, 0.86);
      --card-strong: rgba(255, 253, 247, 0.94);
      --shadow: 0 24px 70px rgba(70, 55, 25, 0.15);
      --gem-accent: #2f8f62;
      --gem-glow: rgba(47, 143, 98, 0.12);
      --codex-accent: #6366f1;
      --codex-glow: rgba(99, 102, 241, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(circle at 12% 12%, rgba(255, 255, 255, 0.96), transparent 28%),
        radial-gradient(circle at 88% 8%, rgba(172, 207, 187, 0.38), transparent 26%),
        radial-gradient(circle at 72% 82%, rgba(232, 190, 124, 0.32), transparent 24%),
        linear-gradient(145deg, #f9f4e5 0%, #edf3e8 52%, #f7efe2 100%);
    }

    .shell {
      width: min(900px, calc(100% - 32px));
      margin: 0 auto;
      padding: 30px 0 42px;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 34px;
      padding: clamp(24px, 4vw, 42px);
      background: linear-gradient(135deg, rgba(255, 253, 246, 0.94), rgba(237, 247, 232, 0.82));
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 240px;
      height: 240px;
      right: -70px;
      top: -70px;
      border-radius: 48% 52% 44% 56%;
      background: linear-gradient(135deg, rgba(81, 142, 112, 0.18), rgba(223, 174, 94, 0.18));
      transform: rotate(12deg);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 18px;
    }

    .topline {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .eyebrow {
      width: fit-content;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 13px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      font-weight: 700;
    }

    .link-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 11px 16px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.74);
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .link-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(67, 54, 31, 0.1);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .lead {
      max-width: 58ch;
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
    }

    /* ── 两个大选项卡 ── */
    .selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 28px;
    }

    .selector-card {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      min-height: 280px;
      border: 2px solid rgba(255, 255, 255, 0.72);
      border-radius: 30px;
      padding: 36px 28px;
      background: var(--card);
      box-shadow: 0 18px 44px rgba(70, 55, 25, 0.08);
      text-decoration: none;
      color: var(--ink);
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    }

    .selector-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 28px 56px rgba(70, 55, 25, 0.14);
    }

    .selector-card.gem:hover {
      border-color: rgba(47, 143, 98, 0.36);
    }

    .selector-card.codex:hover {
      border-color: rgba(99, 102, 241, 0.36);
    }

    /* 装饰性背景圆 */
    .selector-card::before {
      content: "";
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .selector-card:hover::before {
      opacity: 1;
    }

    .selector-card.gem::before {
      background: radial-gradient(circle, var(--gem-glow), transparent 70%);
      top: -40px;
      right: -40px;
    }

    .selector-card.codex::before {
      background: radial-gradient(circle, var(--codex-glow), transparent 70%);
      top: -40px;
      right: -40px;
    }

    .selector-icon {
      position: relative;
      z-index: 1;
      font-size: 64px;
      line-height: 1;
    }

    .selector-title {
      position: relative;
      z-index: 1;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .selector-desc {
      position: relative;
      z-index: 1;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      text-align: center;
      max-width: 28ch;
    }

    /* 状态指示点 */
    .selector-status {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      box-shadow: 0 0 0 4px rgba(117, 109, 93, 0.1);
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .status-dot.online {
      background: var(--gem-accent);
      box-shadow: 0 0 0 4px var(--gem-glow);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.offline {
      background: #b23b3b;
      box-shadow: 0 0 0 4px rgba(178, 59, 59, 0.13);
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 4px var(--gem-glow); }
      50% { box-shadow: 0 0 0 8px var(--gem-glow); }
    }

    .footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 640px) {
      .selector {
        grid-template-columns: 1fr;
      }

      .selector-card {
        min-height: 200px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-content">
        <div class="topline">
          <div class="eyebrow">Bridge status hub</div>
          <a class="link-btn" href="index.html">返回首页</a>
        </div>
        <div>
          <h1>桥接状态总舱</h1>
          <p class="lead">选择你想查看的桥接系统。每一侧都有独立的状态监控、日志和远程控制。</p>
        </div>
      </div>
    </section>

    <section class="selector">
      <a class="selector-card gem" href="gem-status.html" id="gem-card">
        <div class="selector-icon">💎</div>
        <div class="selector-title">Gem</div>
        <div class="selector-desc">Telegram 桥接 · OpenAI Bridge · 记忆同步 · 公网隧道</div>
        <div class="selector-status">
          <span class="status-dot" id="gem-dot"></span>
          <span id="gem-label">检查中…</span>
        </div>
      </a>

      <a class="selector-card codex" href="codex-status.html" id="codex-card">
        <div class="selector-icon">⚡</div>
        <div class="selector-title">Codex</div>
        <div class="selector-desc">Codex 桥接 · 任务执行 · 工作区状态 · 自动化日志</div>
        <div class="selector-status">
          <span class="status-dot" id="codex-dot"></span>
          <span id="codex-label">检查中…</span>
        </div>
      </a>
    </section>

    <div class="footer">
      <span>两个监控室的数据各自独立 · 从本机桥接上报到云端</span>
    </div>
  </main>

  <script>
    const GEM_API = "/api/gem-status";
    const CODEX_API = "/api/codex-status";

    async function checkStatus(apiUrl, dotEl, labelEl, fallbackLabel) {
      try {
        const auth = await window.AppAuth.getSession();
        if (!auth.session) {
          dotEl.className = "status-dot offline";
          labelEl.textContent = "未登录";
          return;
        }

        const response = await fetch(apiUrl, {
          headers: {
            Authorization: `Bearer ${auth.session.access_token}`,
            Accept: "application/json"
          },
          cache: "no-store"
        });

        if (!response.ok) {
          dotEl.className = "status-dot offline";
          labelEl.textContent = "接口不可用";
          return;
        }

        const data = await response.json();
        const age = data.updatedAt
          ? Math.round((Date.now() - new Date(data.updatedAt).getTime()) / 60000)
          : Infinity;

        if (age <= 5) {
          dotEl.className = "status-dot online";
          labelEl.textContent = `${age} 分钟前上报`;
        } else if (age <= 30) {
          dotEl.className = "status-dot";
          labelEl.textContent = `${age} 分钟前`;
        } else {
          dotEl.className = "status-dot offline";
          labelEl.textContent = age === Infinity ? "暂无数据" : `${age} 分钟前`;
        }
      } catch {
        dotEl.className = "status-dot offline";
        labelEl.textContent = fallbackLabel;
      }
    }

    async function init() {
      // 同时检查两个系统的状态
      checkStatus(
        GEM_API,
        document.getElementById("gem-dot"),
        document.getElementById("gem-label"),
        "暂无数据"
      );
      checkStatus(
        CODEX_API,
        document.getElementById("codex-dot"),
        document.getElementById("codex-label"),
        "暂无数据"
      );
    }

    init();
  </script>
</body>
</html>
