<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在返回首页</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            color: #2f2940;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.96), transparent 32%),
                radial-gradient(circle at bottom right, rgba(196, 181, 253, 0.36), transparent 24%),
                linear-gradient(160deg, #fcfaff 0%, #f8f5ff 48%, #f6fbff 100%);
        }

        .card {
            width: min(100%, 520px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.75);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 24px 60px rgba(76, 48, 128, 0.16);
            backdrop-filter: blur(18px);
            padding: 28px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 28px;
        }

        p {
            margin: 0;
            color: #7d738f;
            line-height: 1.8;
        }

        a {
            color: #7c3aed;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>正在回到首页</h1>
        <p>
            现在登录入口已经搬到首页了。如果页面没有自动跳转，
            请直接点这里：<a id="fallback-link" href="index.html">打开首页</a>
        </p>
    </div>

    <script>
        const target = `/index.html${window.location.search || ''}${window.location.hash || ''}`;
        document.getElementById('fallback-link').href = target;
        window.location.replace(target);
    </script>
</body>
</html>
